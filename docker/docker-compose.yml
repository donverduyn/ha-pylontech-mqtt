services:
  pylon2mqtt:
    build:
      context: ..              # repo root — needed to copy parser.py & structs.py
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      # --- Connection type: "serial" or "tcp" ---
      CONNECTION_TYPE: serial

      # Serial mode (only used when CONNECTION_TYPE=serial)
      SERIAL_PORT: /dev/ttyUSB0
      BAUD_RATE: "115200"

      # TCP mode (only used when CONNECTION_TYPE=tcp)
      # If you switch to TCP, also comment out (or delete) the `devices:`
      # block below — it maps a fixed host path unconditionally, so on a
      # host without that device it fails container creation before the app
      # ever starts, even though TCP mode never uses it.
      # CONNECTION_TYPE: tcp
      # TCP_HOST: 192.168.1.100
      # TCP_PORT: "23"

      # --- MQTT broker ---
      MQTT_BROKER: 192.168.1.10
      MQTT_PORT: "1883"
      # MQTT_USER: your_username
      # MQTT_PASS: your_password
      MQTT_TOPIC_PREFIX: pylontech/stack

      # --- Polling ---
      POLL_INTERVAL: "15"        # seconds between polls
      AUTO_SYNC_TIME: "false"    # set "true" to sync BMS clock on startup

    # Only needed for serial mode — maps the USB device into the container.
    # Comment this out (or delete it) if using TCP mode: docker-compose maps
    # this unconditionally regardless of CONNECTION_TYPE, so on a host
    # without /dev/ttyUSB0 it fails container creation before the app starts.
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

    # Persists energy_state.json (cumulative energy_in/energy_out) across
    # container recreation — without this volume the counters reset every
    # time the container is rebuilt/recreated (they survive plain restarts
    # either way, since the writable layer itself is kept).
    volumes:
      - energy_state:/data

volumes:
  energy_state:
