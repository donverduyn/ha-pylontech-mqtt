[tool.pytest.ini_options]
testpaths   = ["tests"]
pythonpath  = ["tests", ".", "docker"]     # "." makes custom_components importable; "docker" exposes pylontech_parser and structs
# "-m 'not e2e'" keeps a bare `pytest` fast and deterministic (no
# containers, no real broker, no waiting out real timeouts/retries); run
# the e2e suite explicitly with `pytest -m e2e`.
# NB: --allow-hosts is effectively decorative — pytest-homeassistant-
# custom-component's pytest_runtest_setup hook unconditionally resets the
# connect allowlist to ["127.0.0.1"] before every test. Tests needing more
# must re-widen it in a fixture (see test_sidecar_e2e's autouse fixture).
addopts     = "-v --tb=short --allow-hosts=127.0.0.1,localhost -m 'not e2e' -p no:sugar"
asyncio_mode = "auto"
# Silences pytest-asyncio's "unset" deprecation warning; "function" matches
# what it already defaults to today, so this is a no-op now and a guard
# against the default changing out from under us later.
asyncio_default_fixture_loop_scope = "function"
markers = [
    "e2e: runs the built sidecar image against real Mosquitto/BMS-stub containers via docker compose (test_sidecar_e2e.py) and/or exercises real timeout/retry/grace-window timing — excluded from the default run (see addopts); CI runs it only after the image build",
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# Beyond Ruff's bare default (E4/E7/E9/F): I (import sorting), B (bugbear,
# common real bugs), UP (pyupgrade, drop dead Python<3.13 idioms), SIM
# (flake8-simplify). Applied repo-wide, including tests, since none of these
# rules relate to the typing strictness that [tool.mypy]/[tool.pyright]
# deliberately relax for tests above — an unsorted import or a bare
# try/except/pass is just as much a real issue in test code.
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.ruff.lint.per-file-ignores]
# docstring reproduces two real, verbatim BMS wire-protocol header/data lines
# (see parse_bat's docstring) — rewording or rewrapping them would misrepresent
# the actual firmware output they document.
"docker/pylontech_parser.py" = ["E501"]

[tool.mypy]
# Scoped to production code only (not tests): this is what Home Assistant's
# strict-typing quality-scale rule actually gates on, and it's the CI source
# of truth for that rule (pyright/Pylance stays for editor feedback,
# including over tests — see [tool.pyright] below). Tests are deliberately
# out of scope rather than given a relaxed override: mypy's per-module
# overrides only match fully-qualified, dot-separated module names (a
# "test_*" prefix glob is rejected as invalid), and every test file here is a
# flat top-level module (test_foo, not tests.test_foo) because tests/ is on
# pytest's pythonpath directly — so there's no pattern that matches "test
# modules" as a group without hardcoding and maintaining every filename.
mypy_path = "docker"
files = ["custom_components", "docker", "scripts"]
# `exclude` (not just `files`) needs to skip tests/: `files` is only consulted
# for a bare `mypy` with no path arguments — `mypy .` (or any explicit path)
# overrides `files` entirely but still walks directories through `exclude`,
# so without this, an explicit invocation re-scans tests/ and reintroduces
# every problem `files` was scoped to avoid above.
exclude = "^(\\.venv|tests|.*/__pycache__)/"
python_version = "3.13"
strict = true
warn_unused_configs = true
# custom_components/ has no __init__.py (standard for HA integrations), so
# mypy can't infer its package root from file structure alone; without this
# it also double-counts coordinator.py as both "pylontech_mqtt.coordinator"
# and "custom_components.pylontech_mqtt.coordinator".
explicit_package_bases = true

[tool.pyright]
include = ["custom_components", "docker", "scripts", "tests"]
exclude = ["**/__pycache__", "**/.pytest_cache"]
typeCheckingMode = "strict"
# Mirrors [tool.pytest.ini_options].pythonpath above: "docker" exposes
# pylontech_parser/structs/main, "." makes custom_components importable,
# matching how the test suite itself resolves these bare imports.
extraPaths = ["docker", "tests", "."]
# Deliberately no venvPath/venv here: pyright falls back to whatever
# interpreter is first on PATH, which is already correct in both places this
# runs (the devcontainer's activated .venv, and CI's actions/setup-python
# interpreter) — hardcoding a path here previously made an out-of-band
# invocation silently analyze whatever unrelated Python happened to be on
# PATH instead of erroring, since CI and the devcontainer don't share a
# filesystem layout. Pyright's own docs recommend against committing this.
pythonVersion = "3.13"
# Home Assistant's Entity declares device_info/available/native_value etc. as
# cached_property for performance, but computing them live via a plain
# @property in a subclass (as this integration and virtually every HA
# integration, including core's own, does) is the correct and intended
# pattern — caching them would silently freeze availability/state at first
# access. Pyright's variance check has no way to know the override is safe,
# so this specific rule is disabled rather than working around it 11+ times
# with per-line ignores across entity.py/number.py/sensor.py.
reportIncompatibleVariableOverride = false

# Production code (custom_components/docker/scripts) is held to strict typing
# above; tests lean on untyped mocks/fixtures and intentionally reach into
# private members (coordinator._process_payload etc.), so strict there is
# mostly noise rather than real bug-catching. pyright's executionEnvironments
# can't override typeCheckingMode itself (only individual rules), so this
# lists exactly the rules "standard" mode disables relative to "strict" —
# confirmed by diffing a standard-mode run against this strict config.
[[tool.pyright.executionEnvironments]]
root = "tests"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"
reportUnknownParameterType = "none"
reportMissingParameterType = "none"
reportUnknownVariableType = "none"
reportPrivateUsage = "none"
reportMissingTypeArgument = "none"
reportUnusedVariable = "none"
reportMissingTypeStubs = "none"
reportUnusedFunction = "none"
reportUnnecessaryComparison = "none"
reportUnnecessaryIsInstance = "none"