version: 2
updates:
  # Python/devcontainer pins are updated together by
  # .github/workflows/dependency-updates.yaml (`make update-deps`) so the
  # lock files and devcontainer feature pins move in one PR.
  #
  # This entry exists only to carry the ignore list below — Dependabot's
  # separate CVE-driven security updates run independently of the
  # updates: schedule/ecosystem list (see close-stale-automation-prs.yaml's
  # top comment) and can't be turned off entirely without losing alerts
  # for genuine issues, but ignore: applies to both version *and* security
  # updates for a matching ecosystem+directory. open-pull-requests-limit: 0
  # suppresses the *version*-update PRs this entry would otherwise start
  # opening (dependency-updates.yaml already owns that), while leaving
  # security updates for anything not listed below.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    # Bundles every currently-available security update (that survives the
    # ignore list below) into one PR instead of one PR per package.
    # Dependabot resolves the whole group together before opening it, so
    # it already verifies the bundle is mutually installable — the same
    # kind of check uv pip compile does for our own lockfiles — rather
    # than us discovering cross-package incompatibility after the fact by
    # merging several independent PRs in sequence. Trade-off: if the
    # bundle fails *our* CI (a real behavioral incompatibility Dependabot's
    # resolution check can't see), the whole group is blocked together,
    # not just the offending package — accepted because everything this
    # applies to is dev-scope (see the ignore list's own comment), and
    # close-stale-automation-prs.yaml already closes a stuck PR after 7
    # days regardless of cause, so a bad group self-clears rather than
    # blocking forever.
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
        # GENERATED by `make update-deps`
        # (scripts/update_dependencies.py:update_dependabot_ignore_list) —
        # do not hand-edit; edit that function instead. Mirrors ignore:
        # below exactly. Redundant in the common case (ignore: already
        # keeps these packages from ever becoming update candidates, for
        # both version and security updates — see that comment), but
        # GitHub's own docs describe a failure mode ("Dependabot fails to
        # update one of the dependencies in a grouped pull request") where
        # one ungroupable dependency sinks the *entire* grouped PR instead
        # of just being dropped from it — this is defense-in-depth
        # specifically for the security-updates group, in case group
        # formation is ever evaluated against something ignore: didn't
        # already filter out. Both lists are generated from the same
        # source in the same run, so they can't drift apart from each
        # other the way two hand-maintained copies would.
        exclude-patterns:
        # <dependabot-exclude-generated>
        - "aiodns"
        - "aiogithubapi"
        - "aiohasupervisor"
        - "aiohttp"
        - "aiohttp-asyncmdnsresolver"
        - "aiohttp-cors"
        - "aiohttp-fast-zlib"
        - "aiozoneinfo"
        - "annotatedyaml"
        - "astral"
        - "async-interrupt"
        - "atomicwrites-homeassistant"
        - "attrs"
        - "audioop-lts"
        - "awesomeversion"
        - "bcrypt"
        - "ciso8601"
        - "coverage"
        - "cronsim"
        - "cryptography"
        - "fnv-hash-fast"
        - "freezegun"
        - "hass-nabucasa"
        - "home-assistant-bluetooth"
        - "homeassistant"
        - "httpx"
        - "ifaddr"
        - "jinja2"
        - "license-expression"
        - "lru-dict"
        - "mock-open"
        - "numpy"
        - "orjson"
        - "pillow"
        - "pipdeptree"
        - "propcache"
        - "psutil-home-assistant"
        - "pydantic"
        - "pyjwt"
        - "pylint-per-file-ignores"
        - "pyopenssl"
        - "pytest"
        - "pytest-aiohttp"
        - "pytest-asyncio"
        - "pytest-cov"
        - "pytest-freezer"
        - "pytest-github-actions-annotate-failures"
        - "pytest-picked"
        - "pytest-socket"
        - "pytest-sugar"
        - "pytest-timeout"
        - "pytest-unordered"
        - "pytest-xdist"
        - "python-slugify"
        - "pyyaml"
        - "requests"
        - "requests-mock"
        - "respx"
        - "securetar"
        - "sqlalchemy"
        - "standard-aifc"
        - "standard-telnetlib"
        - "syrupy"
        - "tqdm"
        - "ulid-transform"
        - "unidiff"
        - "uv"
        - "voluptuous"
        - "voluptuous-openapi"
        - "voluptuous-serialize"
        - "webrtc-models"
        - "yarl"
        - "zeroconf"
        # </dependabot-exclude-generated>
    ignore:
      # GENERATED by `make update-deps`
      # (scripts/update_dependencies.py:update_dependabot_ignore_list) — do
      # not hand-edit the list below; edit that function instead. Every
      # name here is a package that whichever homeassistant or
      # pytest-homeassistant-custom-component release is *currently*
      # locked — across both the "current" and "min" HA legs, see
      # requirements_dev.lock.txt and requirements_dev_min.lock.txt — pins
      # exactly via an unconditional `==` in its own PyPI requires_dist
      # metadata. A Dependabot PR bumping any of these can never resolve,
      # since our own dependency-updates.yaml/min-ha-version-update.yaml
      # (which respect the same upstream pins) can't apply it either.
      # ignore: applies to both version *and* security updates for a
      # matching ecosystem+directory. None of these are runtime
      # dependencies (requirements_runtime.txt is just paho-mqtt/pyserial
      # — see its own comment), so this can't suppress a real
      # production-facing alert as things stand today; revisit if that
      # ever changes. Regenerated on every dependency-updates.yaml and
      # min-ha-version-update.yaml run, so — unlike the hand-maintained
      # list this replaced — it can't drift stale relative to whatever's
      # actually pinned; close-stale-automation-prs.yaml's
      # CI-failure-signature detection remains the backstop for a
      # resolution conflict that *isn't* a bare exact pin (e.g. a genuine
      # transitive range incompatibility this scan can't see ahead of
      # time).
      # <dependabot-ignore-generated>
      - dependency-name: "aiodns"
      - dependency-name: "aiogithubapi"
      - dependency-name: "aiohasupervisor"
      - dependency-name: "aiohttp"
      - dependency-name: "aiohttp-asyncmdnsresolver"
      - dependency-name: "aiohttp-cors"
      - dependency-name: "aiohttp-fast-zlib"
      - dependency-name: "aiozoneinfo"
      - dependency-name: "annotatedyaml"
      - dependency-name: "astral"
      - dependency-name: "async-interrupt"
      - dependency-name: "atomicwrites-homeassistant"
      - dependency-name: "attrs"
      - dependency-name: "audioop-lts"
      - dependency-name: "awesomeversion"
      - dependency-name: "bcrypt"
      - dependency-name: "ciso8601"
      - dependency-name: "coverage"
      - dependency-name: "cronsim"
      - dependency-name: "cryptography"
      - dependency-name: "fnv-hash-fast"
      - dependency-name: "freezegun"
      - dependency-name: "hass-nabucasa"
      - dependency-name: "home-assistant-bluetooth"
      - dependency-name: "homeassistant"
      - dependency-name: "httpx"
      - dependency-name: "ifaddr"
      - dependency-name: "jinja2"
      - dependency-name: "license-expression"
      - dependency-name: "lru-dict"
      - dependency-name: "mock-open"
      - dependency-name: "numpy"
      - dependency-name: "orjson"
      - dependency-name: "pillow"
      - dependency-name: "pipdeptree"
      - dependency-name: "propcache"
      - dependency-name: "psutil-home-assistant"
      - dependency-name: "pydantic"
      - dependency-name: "pyjwt"
      - dependency-name: "pylint-per-file-ignores"
      - dependency-name: "pyopenssl"
      - dependency-name: "pytest"
      - dependency-name: "pytest-aiohttp"
      - dependency-name: "pytest-asyncio"
      - dependency-name: "pytest-cov"
      - dependency-name: "pytest-freezer"
      - dependency-name: "pytest-github-actions-annotate-failures"
      - dependency-name: "pytest-picked"
      - dependency-name: "pytest-socket"
      - dependency-name: "pytest-sugar"
      - dependency-name: "pytest-timeout"
      - dependency-name: "pytest-unordered"
      - dependency-name: "pytest-xdist"
      - dependency-name: "python-slugify"
      - dependency-name: "pyyaml"
      - dependency-name: "requests"
      - dependency-name: "requests-mock"
      - dependency-name: "respx"
      - dependency-name: "securetar"
      - dependency-name: "sqlalchemy"
      - dependency-name: "standard-aifc"
      - dependency-name: "standard-telnetlib"
      - dependency-name: "syrupy"
      - dependency-name: "tqdm"
      - dependency-name: "ulid-transform"
      - dependency-name: "unidiff"
      - dependency-name: "uv"
      - dependency-name: "voluptuous"
      - dependency-name: "voluptuous-openapi"
      - dependency-name: "voluptuous-serialize"
      - dependency-name: "webrtc-models"
      - dependency-name: "yarl"
      - dependency-name: "zeroconf"
      # </dependabot-ignore-generated>

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
