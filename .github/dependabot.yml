version: 2
updates:
  # Python/devcontainer pins are updated together by
  # .github/workflows/dependency-updates.yaml (`make update-deps`) so the
  # lock files and devcontainer feature pins move in one PR.
  #
  # Dependabot's CVE-driven security updates run independently of the
  # schedule below. open-pull-requests-limit: 0 suppresses routine pip
  # version-update PRs because dependency-updates.yaml already refreshes the
  # whole dependency set, while security updates remain enabled.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    # Bundles every currently-available minor/patch security update into
    # one PR instead of one PR per package, except for dependencies excluded
    # below because an HA/phacc release pins them exactly. Major security
    # updates remain individual PRs for review.
    # Dependabot resolves the whole group together before opening it, so
    # it already verifies the bundle is mutually installable — the same
    # kind of check uv pip compile does for our own lockfiles — rather
    # than us discovering cross-package incompatibility after the fact by
    # merging several independent PRs in sequence. Trade-off: if the
    # bundle fails *our* CI (a real behavioral incompatibility Dependabot's
    # resolution check can't see), the whole group is blocked together,
    # not just the offending package — accepted because everything this
    # applies to is predominantly dev-scope, and
    # close-stale-automation-prs.yaml already closes a stuck PR after 7
    # days regardless of cause, so a bad group self-clears rather than
    # blocking forever.
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        # GENERATED by `make update-deps`
        # (scripts/update_dependencies.py:update_dependabot_exclude_list) —
        # do not hand-edit; edit that function instead. Each name is pinned
        # exactly by the currently locked homeassistant/phacc releases. It is
        # excluded from this group, not globally ignored, so Dependabot opens
        # an individual security PR that exposes the blocked dependency. The
        # stale-automation workflow keeps that PR visible for at least seven
        # days before closing a confirmed HA-floor conflict.
        exclude-patterns:
        # <dependabot-exclude-generated>
        - "aiodns"
        - "aiogithubapi"
        - "aiohasupervisor"
        - "aiohttp"
        - "aiohttp-asyncmdnsresolver"
        - "aiohttp-cors"
        - "aiohttp-fast-zlib"
        - "aiozoneinfo"
        - "annotatedyaml"
        - "astral"
        - "async-interrupt"
        - "atomicwrites-homeassistant"
        - "attrs"
        - "audioop-lts"
        - "awesomeversion"
        - "bcrypt"
        - "ciso8601"
        - "coverage"
        - "cronsim"
        - "cryptography"
        - "fnv-hash-fast"
        - "freezegun"
        - "hass-nabucasa"
        - "home-assistant-bluetooth"
        - "homeassistant"
        - "httpx"
        - "ifaddr"
        - "jinja2"
        - "license-expression"
        - "lru-dict"
        - "mock-open"
        - "numpy"
        - "orjson"
        - "paho-mqtt"
        - "pillow"
        - "pipdeptree"
        - "propcache"
        - "psutil-home-assistant"
        - "pydantic"
        - "pyjwt"
        - "pylint-per-file-ignores"
        - "pyopenssl"
        - "pytest"
        - "pytest-aiohttp"
        - "pytest-asyncio"
        - "pytest-cov"
        - "pytest-freezer"
        - "pytest-github-actions-annotate-failures"
        - "pytest-picked"
        - "pytest-socket"
        - "pytest-sugar"
        - "pytest-timeout"
        - "pytest-unordered"
        - "pytest-xdist"
        - "python-slugify"
        - "pyyaml"
        - "requests"
        - "requests-mock"
        - "respx"
        - "securetar"
        - "sqlalchemy"
        - "standard-aifc"
        - "standard-telnetlib"
        - "syrupy"
        - "tqdm"
        - "ulid-transform"
        - "unidiff"
        - "uv"
        - "voluptuous"
        - "voluptuous-openapi"
        - "voluptuous-serialize"
        - "webrtc-models"
        - "yarl"
        - "zeroconf"
        # </dependabot-exclude-generated>

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    groups:
      # Keep minor/patch Docker image updates in one ecosystem-specific PR;
      # major image updates remain individual PRs for review.
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Group minor/patch action updates into one ecosystem-specific PR;
      # major action updates remain individual PRs for review. This also
      # preserves atomic CodeQL init/analyze updates for their usual patch
      # releases; tests.yaml requires both subpaths to use the same version.
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
