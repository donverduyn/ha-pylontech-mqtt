name: Minimum HA Version Update

on:
  workflow_dispatch:
  schedule:
    # Monday 08:30 UTC; offset from dependency-updates.yaml's 08:17 run so
    # the two don't race over the same working tree.
    - cron: "30 8 * * 1"

permissions: {}

concurrency:
  group: min-ha-version-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    # scripts/update_dependencies.py's --min-ha-version-only path can call
    # uv pip compile up to MIN_HA_VERSION_MAX_ATTEMPTS (12) times walking
    # forward through candidate releases, and none of the subprocess
    # calls it makes (uv, npm, docker CLI) have a timeout of their own,
    # unlike its urllib calls. A single hung registry/network call on any
    # one attempt would otherwise run until GitHub's 6-hour job default.
    # More generous than dependency-updates.yaml's 20 minutes since a
    # legitimately slow (not hung) run can genuinely need several
    # attempts before one resolves.
    timeout-minutes: 30
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: "astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990" # v8.3.2
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt

      - name: Refresh minimum supported HA version
        run: python3 scripts/update_dependencies.py --min-ha-version-only

      # Deliberately no `gh pr merge --auto` after this, unlike
      # dependency-updates.yaml — a human reviews and merges this one.
      - name: Open or update minimum-version PR
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/min-ha-version-update
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Bump minimum supported Home Assistant version"
          pr-title: "Bump minimum supported Home Assistant version"
          pr-body: |
            Automated minimum-HA-version floor refresh generated by
            `scripts/update_dependencies.py --min-ha-version-only`.

            Targets whichever Home Assistant release was current
            ~MIN_HA_VERSION_MONTHS_BEHIND months ago (see
            scripts/update_dependencies.py), walking forward release-by-release
            (never backward) until one resolves cleanly — see
            requirements_dev_min.txt for why that walk-forward exists.

            **Not auto-merged.** Dropping support for an older HA version is
            a deliberate call, not a mechanical bump — review the diff
            (hacs.json, requirements_dev_min.txt/.lock.txt, tests.yaml's
            min python-version, and `.github/dependabot.yml`'s regenerated
            security-group exclusions) before merging.
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ steps.app-token.outputs.token }}
