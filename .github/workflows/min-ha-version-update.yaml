name: Minimum HA Version Update

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1"

permissions: {}

concurrency:
  group: min-ha-version-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    environment: automation
    steps:
      - name: Refuse manual execution from a non-default branch
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "::error::Minimum-version automation may only run from the default branch."
          exit 1

      # See dependency-updates.yaml for why token creation remains inline and
      # why checkout deliberately does not persist the credential.
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: "astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9" # v9.0.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt
            uv.toml

      - name: Refresh minimum supported HA version
        run: python3 scripts/update_dependencies.py --min-ha-version-only

      - name: Open or update minimum-version PR
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/min-ha-version-update
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Bump minimum supported Home Assistant version"
          pr-title: "Bump minimum supported Home Assistant version"
          pr-body: |
            Automated minimum-HA-version floor refresh generated by
            \`scripts/update_dependencies.py --min-ha-version-only\`.

            Targets the Home Assistant release selected by the repository's
            months-behind policy and walks forward until the dependency set
            resolves. This PR is deliberately not auto-merged; dropping support
            for an older Home Assistant version requires human review.
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ steps.app-token.outputs.token }}
