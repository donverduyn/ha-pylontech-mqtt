name: Minimum HA Version Update

on:
  workflow_dispatch:
  schedule:
    # Monday 08:30 UTC; offset from dependency-updates.yaml's 08:17 run so
    # the two don't race over the same working tree.
    - cron: "30 8 * * 1"

permissions: {}

concurrency:
  group: min-ha-version-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}

      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt

      - name: Close stale minimum-version PR (open >7 days)
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
          BRANCH: automation/min-ha-version-update
        # Runs before the refresh below so that if the existing PR is stale,
        # it's already closed by the time "Open or update" looks for one —
        # otherwise it would just keep editing a PR nobody's merging. Keeps
        # at most one open PR from this automation at a time: either the
        # current (not yet stale) one gets updated in place, or a fresh one
        # opens next once this step has retired the old one.
        run: |
          stale_pr="$(gh pr list --head "$BRANCH" --state open --json number,createdAt \
            --jq '.[] | select((now - (.createdAt | fromdateiso8601)) > (7 * 24 * 60 * 60)) | .number')"
          if [ -n "$stale_pr" ]; then
            echo "Closing stale PR #$stale_pr (open more than 7 days without merging)."
            gh pr close "$stale_pr" --comment \
              "Closing automatically: this PR has been open more than 7 days without merging. Keeping at most one open minimum-HA-version PR at a time — a fresh one (reflecting whatever's current) will open on the next scheduled run."
          fi

      - name: Refresh minimum supported HA version
        run: python3 scripts/update_dependencies.py --min-ha-version-only

      # Deliberately no `gh pr merge --auto` after this, unlike
      # dependency-updates.yaml — a human reviews and merges this one.
      - name: Open or update minimum-version PR
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/min-ha-version-update
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Bump minimum supported Home Assistant version"
          pr-title: "Bump minimum supported Home Assistant version"
          pr-body: |
            Automated minimum-HA-version floor refresh generated by
            `scripts/update_dependencies.py --min-ha-version-only`.

            Targets whichever Home Assistant release was current
            ~MIN_HA_VERSION_MONTHS_BEHIND months ago (see
            scripts/update_dependencies.py), walking forward release-by-release
            (never backward) until one resolves cleanly — see
            requirements_dev_min.txt for why that walk-forward exists.

            **Not auto-merged.** Dropping support for an older HA version is
            a deliberate call, not a mechanical bump — review the diff
            (hacs.json, requirements_dev_min.txt/.lock.txt, tests.yaml's
            min python-version) before merging.
          gh-token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
