name: Auto-release

# Turns a manifest.json version bump, once it lands on master, into a real
# release: calls the publication pipeline (release.yaml) with the matching
# v<version> tag name. The tag itself is created by that pipeline's *last*
# step, so a failed release leaves nothing behind — no tag, no image, no
# GitHub Release — and can be retried by re-running it or re-merging.
#
# manifest.json carries *exactly* the version being released, rc suffix
# included — one rule for both release kinds: bumping it to "2.1.0-rc1"
# cuts a prerelease (no ":latest" retag, marked prerelease on GitHub so
# HACS only offers it to beta opt-ins); bumping it to "2.1.0" cuts the
# final. The suffix must live in the manifest because release.yaml
# requires tag and manifest to agree exactly — if the manifest carried the
# bare base version during an rc phase, the bump that put it on master
# would already have auto-released the final here, making rcs unreachable.
#
# The trigger is "the version *changed in this push*", deliberately not
# "no tag exists for the current version": the manifest was allowed to
# pre-claim 2.0.0 before this automation (and the exact-match rule)
# existed, while the hardware-validation gate holds releases to rc
# prereleases (see CONTRIBUTING.md) — a tag-absence check would have cut
# that final on the first merge after this workflow landed. Releasing
# therefore stays a deliberate act — a PR that bumps the version — with
# only the build/publish mechanics automated. No tests run downstream of
# here: every commit on master already passed the full unit → build →
# e2e pipeline on its PR (see tests.yaml), enforced by branch
# protection's required status checks.
# Also carries populate-docker-build-cache (unrelated to releasing, but the
# push:master trigger is the natural signal for it — see its own comment).
on:
  push:
    branches:
      - master

permissions: {}

# Serialize runs: two quick merges where the second bumps the version could
# otherwise race on the version-diff. This only serializes execution order,
# though — it does not guarantee every push gets a run. GitHub Actions keeps
# at most one *pending* run per concurrency group; a third rapid push
# cancels the second push's still-queued run outright rather than merely
# delaying it behind the first. If that second push was itself a version
# bump, its release is silently skipped (not merely late) — detect's own
# "skipped intermediate version" warning below is what surfaces that,
# should it ever happen. End state stays correct either way: whichever run
# executes last still diffs against its own immediate parent and releases
# whatever version is actually on master.
concurrency:
  group: autorelease
  cancel-in-progress: false

jobs:
  detect:
    runs-on: "ubuntu-latest"
    outputs:
      release: ${{ steps.check.outputs.release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          # The parent commit is needed to diff the version against what
          # master said before this push.
          fetch-depth: 2
      - name: Check whether this push bumped the manifest version
        id: check
        run: |
          manifest="custom_components/pylontech_mqtt/manifest.json"
          new="$(jq -r .version "$manifest")"
          old="$(git show "HEAD^:$manifest" 2>/dev/null | jq -r .version || echo "")"
          if [ "$new" = "$old" ]; then
            echo "Version unchanged ($new) — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A version bump that itself was never tagged (no v$old release)
          # right before this push bumped it again is the signature of a
          # run this workflow's concurrency group silently dropped (see the
          # concurrency block's own comment) -- the run that should have
          # released $old got its pending slot cancelled by this push
          # arriving before it ran. Not fatal: $new below still releases
          # correctly. Just a visibility signal so a human can decide
          # whether $old needs a manual release.yaml workflow_dispatch.
          if [ -n "$old" ] && ! git ls-remote --exit-code --tags origin "refs/tags/v$old" > /dev/null; then
            echo "::warning::Previous manifest version $old was never tagged (no v$old release) before this push bumped it to $new — likely an intermediate release skipped by a superseded pending run (see this workflow's concurrency comment). Releasing $new as usual; publish v$old manually via release.yaml's workflow_dispatch if it's still needed."
          fi
          tag="v$new"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" > /dev/null; then
            echo "::warning::Version bumped to $new but tag $tag already exists — not releasing."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Version bumped ${old:-<none>} -> $new; releasing as $tag"
          {
            echo "release=true"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.release == 'true'
    # The called workflow's own permission needs; a reusable workflow can
    # never exceed what the calling job grants.
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release.yaml
    with:
      tag: ${{ needs.detect.outputs.tag }}

  populate-docker-build-cache:
    # tests.yaml's docker-build job caches the built sidecar image keyed on
    # its actual inputs (Dockerfile, requirements_runtime.lock.txt, src/**),
    # but GitHub Actions cache entries are scoped to the ref that created
    # them — a PR's refs/pull/<n>/merge cache is invisible to every OTHER
    # PR's ref, even with an identical key. Confirmed live: many PRs in a
    # row computed the exact same cache key (none touched these inputs)
    # yet every single one still rebuilt from scratch, each saving its own
    # now-unreachable copy under its own ref — the caching had no cross-PR
    # effect at all, only ever helping a single PR across its own re-pushes
    # to the same ref. The one scope every PR CAN fall back to is the base
    # branch's cache — but tests.yaml never runs on push:master
    # (deliberately, per its own "on:" comment), so that scope was never
    # actually being populated. This job exists purely to populate it: the
    # same build+smoke-test+cache sequence as tests.yaml's docker-build
    # (shared via build-sidecar-image so the two can't drift out of sync —
    # see its own comment on why a cached image must always have actually
    # been smoke-tested), run here instead so the *next* PR gets a real
    # cache hit when these inputs haven't changed, rather than every
    # single PR rebuilding unconditionally.
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
      - uses: ./.github/actions/build-sidecar-image
