name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

permissions: {}

concurrency:
  group: dependency-updates
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    timeout-minutes: 20
    # Store the App private key in this environment and restrict it to the
    # default branch in repository settings.
    environment: automation
    steps:
      - name: Refuse manual execution from a non-default branch
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "::error::Dependency automation may only run from the default branch."
          exit 1

      # This cannot use the local automation-app-token composite because the
      # repository has not been checked out yet. The resulting token is not
      # persisted by checkout; create-or-update-pr exposes it to git only in
      # the final publication step.
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: "astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9" # v9.0.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt
            uv.toml
            .devcontainer/tool-versions.env

      - name: Update dependency constraints and pins
        run: make update-deps

      - name: Open or update dependency PR
        id: pr
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/dependency-updates
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Update dependency constraints and pins"
          pr-title: "Update dependency constraints and pins"
          pr-body: |
            Automated dependency refresh generated by \`make update-deps\`.

            This updates devcontainer feature/tool constraints, exact non-npm
            pins, generated Python requirement lock files, the pinned uv
            requirement, and Dependabot's generated exclusions together.
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge
        if: steps.pr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: automation/dependency-updates
        run: |
          gh pr merge "$BRANCH" --auto --squash \
            || echo "Could not enable auto-merge; leaving the PR for review."
