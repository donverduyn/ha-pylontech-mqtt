name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    # Monday 08:17 UTC; offset from the top of the hour to avoid the common
    # scheduled-workflow rush.
    - cron: "17 8 * * 1"

permissions: {}

concurrency:
  group: dependency-updates
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          # Optional: set UPDATE_PR_TOKEN to a PAT or GitHub App token if PRs
          # opened by this workflow must trigger normal pull_request CI. The
          # default GITHUB_TOKEN is enough to create/update the PR branch.
          token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}

      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt
            .devcontainer/tool-versions.env

      - name: Update dependency pins
        run: make update-deps

      - name: Open or update dependency PR
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
          BRANCH: automation/dependency-updates
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BODY: |
            Automated dependency refresh generated by `make update-deps`.

            This updates devcontainer feature/tool pins and generated Python requirement lock files together so rebuilds remain deterministic.
        run: |
          if git diff --quiet; then
            echo "No dependency updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .
          git commit -m "Update dependency pins"
          git push --force-with-lease origin "$BRANCH"

          pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "Update dependency pins" --body "$PR_BODY"
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$BRANCH" \
              --title "Update dependency pins" \
              --body "$PR_BODY"
          fi
