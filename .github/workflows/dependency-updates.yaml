name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    # Monday 08:17 UTC; offset from the top of the hour to avoid the common
    # scheduled-workflow rush.
    - cron: "17 8 * * 1"

permissions: {}

concurrency:
  group: dependency-updates
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    # scripts/update_dependencies.py's subprocess calls (uv pip compile,
    # npm view, docker CLI inspects) have no timeout of their own, unlike
    # its urllib calls (which all pass timeout=) — a hung registry/network
    # call here would otherwise run until GitHub's 6-hour job default,
    # consuming a runner slot for a routine weekly job. Generous relative
    # to the normal ~1-2 minute run, but bounds the worst case.
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          # Optional: set UPDATE_PR_TOKEN to a PAT or GitHub App token if PRs
          # opened by this workflow must trigger normal pull_request CI. The
          # default GITHUB_TOKEN is enough to create/update the PR branch.
          token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}

      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt
            .devcontainer/tool-versions.env

      - name: Update dependency pins
        run: make update-deps

      - name: Open or update dependency PR
        id: pr
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/dependency-updates
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Update dependency pins"
          pr-title: "Update dependency pins"
          pr-body: |
            Automated dependency refresh generated by `make update-deps`.

            This updates devcontainer feature/tool pins and generated Python requirement lock files together so rebuilds remain deterministic.
          gh-token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}

      - name: Enable auto-merge
        if: steps.pr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
          BRANCH: automation/dependency-updates
        # Requires UPDATE_PR_TOKEN (see checkout step above): pushes made
        # with the default GITHUB_TOKEN don't trigger pull_request-based
        # checks, so the required "HACS Action"/"validate"/"tests-finished"
        # contexts would never run and this PR could never satisfy branch
        # protection to auto-merge.
        run: gh pr merge "$BRANCH" --auto --squash
