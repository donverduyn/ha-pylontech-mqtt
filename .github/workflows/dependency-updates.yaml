name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    # Monday 08:17 UTC; offset from the top of the hour to avoid the common
    # scheduled-workflow rush.
    - cron: "17 8 * * 1"

permissions: {}

concurrency:
  group: dependency-updates
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    # scripts/update_dependencies.py's subprocess calls (uv pip compile,
    # npm view, docker CLI inspects) have no timeout of their own, unlike
    # its urllib calls (which all pass timeout=) — a hung registry/network
    # call here would otherwise run until GitHub's 6-hour job default,
    # consuming a runner slot for a routine weekly job. Generous relative
    # to the normal ~1-2 minute run, but bounds the worst case.
    timeout-minutes: 20
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          # App-authenticated pushes trigger normal pull_request CI, unlike
          # pushes made with the workflow's default GITHUB_TOKEN.
          token: ${{ steps.app-token.outputs.token }}

      - uses: "astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990" # v8.3.2
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt
            .devcontainer/tool-versions.env

      - name: Update dependency constraints and pins
        run: make update-deps

      - name: Open or update dependency PR
        id: pr
        uses: ./.github/actions/create-or-update-pr
        with:
          branch: automation/dependency-updates
          base-branch: ${{ github.event.repository.default_branch }}
          commit-message: "Update dependency constraints and pins"
          pr-title: "Update dependency constraints and pins"
          pr-body: |
            Automated dependency refresh generated by `make update-deps`.

            This updates devcontainer feature/tool constraints, exact non-npm pins, and generated Python requirement lock files together, and regenerates `.github/dependabot.yml`'s security-group exclusions from whatever's now locked. npm-installed tools float only within their selected major release lines.
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge
        if: steps.pr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: automation/dependency-updates
        # Not fatal on failure (e.g. the PR was already merged/closed by the
        # time this runs, or a transient API hiccup) -- same reasoning as
        # dependabot-auto-merge.yaml's identical `gh pr merge --auto` call.
        # GitHub Actions bash steps run with `-e` by default, so without
        # this guard any such failure here would fail the whole job despite
        # the dependency refresh above having already succeeded and been
        # pushed -- a spurious red run for what was actually a successful
        # update.
        run: gh pr merge "$BRANCH" --auto --squash || echo "could not enable auto-merge — leaving for manual review."
