name: Tests

on:
  # No push:master trigger: master commits are already covered by the
  # pull_request run on the PR that merged them (required by branch
  # protection).
  # Deliberately NOT adding labeled/unlabeled here (tried once, reverted):
  # `gh pr create --label` fires opened and labeled as two separate events
  # for the same commit, since GitHub has no atomic "create pre-labeled"
  # mutation — with both types listed, that one `gh` call doubled every job
  # below. detect-release's live `gh pr view` lookup (see its comment) is
  # what makes dropping labeled/unlabeled safe: a label attached moments
  # after opened/synchronize/reopened fires is still visible to *this* run
  # once its live-check step executes a few seconds in, so the common case
  # (labeling at/near creation) keeps working with only one run. The
  # one capability this trades away: relabeling a PR *after* its most
  # recent run already finished no longer alone produces a fresh result —
  # closing/reopening the PR (still in types) or pushing an empty commit
  # does.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}

concurrency:
  # cancel-in-progress cancels a *stale* run for this PR (e.g. a new push
  # superseding the previous push's run) — safe now that labeled/unlabeled
  # can't trigger this workflow at all, so there's no longer a label-kind
  # run that a cancellation could clash with (see the "on" comment above).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Every real job below (pytest/lint/docker-build/meta-lint/e2e/
# codeql-analyze) is gated on the "skip-ci" PR label so a maintainer can
# fast-track a merge (e.g. an environment-settings-only change) without
# waiting on the full matrix. A skipped job still reports a "skipped"
# conclusion for its required-status-check context, which branch
# protection treats as satisfied — it does not disable branch protection
# itself, so applying the label is the only way to bypass these checks.
# skip-ci on a release PR is refused, not silently ignored: a version
# bump merged to master auto-releases via autorelease.yaml with no
# further checks downstream, so that's the one PR shape that must never
# skip CI, and it must fail loudly rather than quietly fall back to
# running everything (which would look identical to a normal PR in the
# checks list, easy to miss). So each real job's condition reads "skip
# only if the label is set AND this is confirmed not a release";
# anything else — no label, an unconfirmed verdict (detect-release itself
# failed), or skip-ci on a *confirmed* release — still dispatches the
# job. The confirmed-release case is caught by an explicit early bail
# step (see detect-release and tests-finished below), not by silently
# running the real steps. This means codeql-analyze (the actual CodeQL
# scan, run directly here rather than as a separate workflow — see its
# own comment for why) is skippable too on a non-release PR, same as
# every other real job: skip-ci is refused on release PRs, so every PR
# that can actually reach autorelease.yaml still gets scanned for real.
# codeql-gate then checks the scan's result for an open high/critical
# alert, deriving its own skip from codeql-analyze's result rather than
# repeating this condition — same pattern as e2e deriving from
# pytest/docker-build below.
# pytest defines this condition once as a YAML anchor (&skip_unless_real_check);
# lint/meta-lint/docker-build/codeql-analyze alias it rather than
# repeating the string.

jobs:
  # See detect-release.yaml for why this is a reusable-workflow call rather
  # than an inline job: hacs.yaml and hassfest.yaml need the exact same two
  # signals (is_release, skip_ci) and previously each carried their own
  # identical ~40-line copy of this job to get them.
  detect-release:
    uses: ./.github/workflows/detect-release.yaml
    permissions:
      contents: read
      pull-requests: read

  pytest:
    name: "pytest (${{ matrix.ha-version }})"
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # Skips only in the one legitimate case: skip-ci is set AND
    # detect-release confirmed this is NOT a release. Every other
    # combination — no label, an unconfirmed verdict, or skip-ci on a
    # *confirmed* release — still dispatches this job. See the top-of-file
    # comment and tests-finished below for why a confirmed release doesn't
    # just skip quietly.
    # The leading !cancelled() matters even though this job doesn't want
    # to unconditionally run: a job's `if:` is implicitly ANDed with
    # success() of its `needs` unless the condition itself calls
    # always()/success()/failure()/cancelled() — without it, this job
    # would silently be skipped by GitHub outright whenever detect-release
    # fails for *any* reason (including a plain network flake), which is
    # the opposite of "fails closed to running the checks".
    # !cancelled() specifically rather than always(): always() would also
    # keep this job racing to completion even when detect-release was
    # itself cancelled — which happens when a new push to this PR
    # supersedes this whole run via the concurrency group above. In that
    # case the run is already being torn down; !cancelled() correctly backs
    # this job off too instead of burning several minutes running pytest
    # for real just to have the result discarded a moment later.
    # Anchored here and aliased by lint/meta-lint/docker-build below — same
    # condition, defined once. (Can't use env: for this instead: the env
    # context isn't available in job-level `if:`.)
    if: &skip_unless_real_check "!cancelled() && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    strategy:
      fail-fast: false
      matrix:
        include:
          # "current" tracks whatever HA version requirements_dev.lock.txt
          # was last compiled against; "min" pins the version declared in
          # hacs.json ("homeassistant": "2025.4.0"; see
          # requirements_dev_min.txt for why every release between 2024.11
          # and 2025.4.0 is uninstallable or incompatible) so a change that
          # only works on newer HA gets caught here instead of by a user
          # still on the declared minimum.
          #
          # python-version tracks each lockfile's own homeassistant pin's
          # requires-python floor (current: 2026.7.1 needs >=3.14.2; min:
          # 2025.4.0 needs >=3.13.2) rather than being a single shared
          # value — HA bumped its own minimum Python version partway
          # through the "current" range this project supports.
          - ha-version: current
            lockfile: requirements_dev.lock.txt
            python-version: "3.14"
          - ha-version: min
            lockfile: requirements_dev_min.lock.txt
            python-version: "3.13"
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - uses: "./.github/actions/setup-python-env"
        with:
          python-version: ${{ matrix.python-version }}
          lockfile: ${{ matrix.lockfile }}
      - name: Run test suite
        # --cov-fail-under is a non-regression floor (current combined
        # statement+branch coverage is ~94%), not a target — it catches a
        # change that quietly drops coverage, not a mandate to hit 100%.
        # --cov-branch is included, not just statements: a line can run
        # (satisfying statement coverage) while one of its branches never
        # does, e.g. an `if`/`or` condition where only one side is ever
        # exercised — exactly the shape of gap a statement-only gate misses.
        # 88 (statement-only) previously left ~90 statements' worth of slack
        # before the gate would even notice; 92 (branch-inclusive) leaves a
        # couple of points of headroom for normal variance without hiding a
        # real regression the way the old floor did. Scoped to
        # custom_components + src since that's the shipped code; scripts/
        # (e2e-only helpers) is excluded.
        # No e2e here: the e2e suite runs against the *built* sidecar image,
        # so it lives in the e2e job below, downstream of docker-build.
        run: >
          pytest --cov=custom_components --cov=src --cov-branch
          --cov-report=term-missing --cov-fail-under=92

  lint:
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: *skip_unless_real_check
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - uses: "./.github/actions/setup-python-env"
        with:
          # Matches the pytest job's "current" leg: requirements_dev.lock.txt
          # now pins homeassistant==2026.7.1, which requires Python >=3.14.2.
          python-version: "3.14"
          lockfile: requirements_dev.lock.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Pyright
        run: pyright
      - name: Cache mypy incremental cache
        # Keyed on mypy's pinned version (via the lockfile hash) plus this
        # commit's sha so every run always saves a fresh cache entry; the
        # restore-keys prefix match falls back to the closest previous run's
        # cache so mypy's incremental mode only re-checks files that changed
        # since then instead of the whole project cold.
        uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('requirements_dev.lock.txt') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('requirements_dev.lock.txt') }}-
      - name: Mypy
        run: mypy
      - name: pip-audit (runtime dependencies)
        run: pip-audit -r requirements_runtime.lock.txt

  meta-lint:
    # Lints the project's own tooling (workflows, shell scripts, Dockerfile)
    # rather than its Python code — separate job so a failure here doesn't
    # block on/get confused with the `lint` job's Python-specific tools.
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: *skip_unless_real_check
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - name: Install actionlint and Hadolint
        # ubuntu-latest doesn't ship either, unlike shellcheck below.
        # Downloaded and checksum-verified directly (pinned release asset)
        # rather than via a third-party wrapper action, to match this repo's
        # existing preference for pinned, minimal-trust-surface CI steps.
        # Version+checksum come from tool-versions.env -- the same file
        # postCreate.sh installs both from -- instead of a second,
        # independently hand-maintained pair here; `make update-deps` keeps
        # both in sync.
        run: |
          # shellcheck disable=SC1091 # path is repo-local, read at CI runtime
          . .devcontainer/tool-versions.env

          curl -sSfLo /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v$ACTIONLINT_VERSION/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "$ACTIONLINT_SHA256  /tmp/actionlint.tar.gz" | sha256sum -c
          tar xzf /tmp/actionlint.tar.gz -C /tmp actionlint

          curl -sSfLo /tmp/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v$HADOLINT_VERSION/hadolint-linux-x86_64"
          echo "$HADOLINT_SHA256  /tmp/hadolint" | sha256sum -c
          chmod +x /tmp/hadolint
      - name: actionlint
        run: /tmp/actionlint -color .github/workflows/*.yaml
      - name: ShellCheck
        # Preinstalled on ubuntu-latest runners; covers every shell script in
        # the repo (docker/Dockerfile has no other shell to lint). Discovered
        # via git ls-files rather than a hand-maintained path list, so new
        # scripts are covered automatically instead of silently skipped --
        # mirrors pre-commit's shellcheck hook, which auto-discovers the same
        # way via `types: [shell]`.
        run: git ls-files '*.sh' | xargs shellcheck
      - name: Hadolint
        # Discovered via git ls-files rather than a hand-maintained path
        # list, so a new Dockerfile is covered automatically instead of
        # silently skipped -- mirrors pre-commit's hadolint hook, which
        # auto-discovers the same way via `types: [dockerfile]`.
        run: git ls-files '*Dockerfile*' | xargs /tmp/hadolint

  codeql-analyze:
    name: "codeql-analyze (${{ matrix.language }})"
    needs: [detect-release]
    # See pytest's identical condition/comment above. Runs the actual scan
    # directly in this workflow (previously a separate codeql.yml, called
    # via a reusable codeql-gate.yaml that polled its check-runs across
    # workflows) so that a single needs: dependency below is enough to
    # know the scan has finished — no cross-workflow polling, and no
    # separate checks:read permission to query check-runs by SHA, both of
    # which were real sources of bugs the old design hit in practice.
    # Trades away codeql.yml's weekly schedule (re-scans unchanged code
    # against newer CodeQL query packs) and its push:master trigger —
    # accepted deliberately: this workflow only runs on PR pushes, and
    # tests.yaml already holds that master commits are covered by the PR
    # that merged them (see this file's "on:" comment).
    if: *skip_unless_real_check
    runs-on: "ubuntu-latest"
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - name: Initialize CodeQL
        uses: "github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a" # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        # codeql-gate (below) queries the code-scanning/alerts REST API
        # immediately after this job finishes — that only reliably sees
        # alerts from *this* push (not just older, already-processed ones)
        # because this action's own `wait-for-processing` input defaults to
        # "true" (confirmed against analyze/action.yml for this pinned
        # v4.37.1): the step itself polls
        # `code-scanning/sarifs/{sarif_id}` internally and doesn't return
        # success until GitHub reports the upload fully processed, not
        # merely accepted. Investigated as a suspected race (SARIF
        # processing is normally async) and confirmed a non-issue given
        # this default; don't set `wait-for-processing: false` here without
        # adding an explicit poll/delay in codeql-gate to replace it.
        #
        # init and analyze must always be pinned to the exact same
        # codeql-action version together — analyze refuses to process a
        # config init wrote at a different version ("Loaded a
        # configuration file for version 'X', but running version 'Y'").
        # Dependabot doesn't know that: it proposed this bump and init's
        # above as two independent PRs (one per action subpath), and each
        # one alone mismatches the other still sitting at the old pin. See
        # .github/dependabot.yml's github-actions group for the fix.
        uses: "github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a" # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"

  codeql-gate:
    needs: [codeql-analyze]
    # codeql-analyze's own condition already fully encodes skip-ci's
    # effect — same pattern as e2e deriving from pytest/docker-build
    # rather than repeating the skip-ci/detect-release logic itself. Runs
    # once the scan completed for real, or was legitimately skip-ci'd;
    # does NOT run if the scan itself failed — tests-finished catches
    # that directly via codeql-analyze's own result below, not through
    # this job silently skipping.
    if: "needs.codeql-analyze.result == 'success' || needs.codeql-analyze.result == 'skipped'"
    runs-on: "ubuntu-latest"
    permissions:
      security-events: read
    steps:
      - name: Refuse if this PR has an open high/critical CodeQL alert
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # refs/pull/<n>/merge under pull_request, matching what
          # codeql-analyze's SARIF upload associates its alerts with;
          # falls back to github.ref for workflow_dispatch (no
          # pull_request object to read a number from).
          REF: ${{ (github.event.pull_request.number && format('refs/pull/{0}/merge', github.event.pull_request.number)) || github.ref }}
        # Checks *all* currently-open high/critical alerts on this ref,
        # not just ones newly introduced by this push — an old alert
        # already present should block exactly as much as a brand-new
        # one.
        run: |
          set -euo pipefail
          # -X GET is required: gh api defaults to POST whenever -f params
          # are present, which 404s on this GET-only endpoint.
          # --jq '.[]' (rather than a `[...]`-wrapped filter) matters under
          # --paginate: it emits one alert object per line across all
          # pages, which `jq -s` below can slurp into a single array
          # regardless of how many pages came back — a `[...]`-wrapped
          # filter would instead print one array *per page*, concatenated
          # as separate top-level JSON values that `jq length` can't sum
          # correctly.
          alerts="$(gh api "repos/$REPO/code-scanning/alerts" -X GET -f "ref=$REF" -f state=open --paginate --jq '.[]' \
            | jq -s '[.[] | select(.rule.security_severity_level == "high" or .rule.security_severity_level == "critical")]')"
          count="$(echo "$alerts" | jq 'length')"
          if [ "$count" != "0" ]; then
            echo "$alerts" | jq -r '.[] | "#\(.number) [\(.rule.security_severity_level)] \(.rule.description) — \(.html_url)"'
            echo "::error::$count open high/critical CodeQL alert(s) on $REF — refusing to proceed until resolved or dismissed."
            exit 1
          fi
          echo "No open high/critical CodeQL alerts on $REF."

  docker-build:
    # Runs concurrently with pytest rather than gated behind it: pytest
    # (~40s) is slower than this job (~20s), so waiting for it serially
    # would only lengthen the critical path on the common (green) path
    # without pytest's fast-fail ever actually saving time here. e2e (below)
    # still requires *both* pytest and this job to succeed before it runs,
    # so a failing unit suite still short-circuits before the expensive e2e
    # stage — it just no longer blocks this cheap build+smoke-test from
    # starting. No trivy/SBOM here — those describe shipped artifacts, so
    # they live in release.yaml against the image actually being published.
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: *skip_unless_real_check
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      # Build/cache/smoke-test logic lives in this composite action, shared
      # with autorelease.yaml's populate-docker-build-cache job — see its
      # own comment for why a PR-scoped cache alone was never actually
      # getting reused across PRs, and why that job exists.
      - uses: ./.github/actions/build-sidecar-image
      - uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: sidecar-image
          path: /tmp/pylon2mqtt-ci.tar.gz
          # `docker save` + artifact (rather than each e2e matrix leg running
          # its own `docker build`) so both legs assert against the
          # *identical* bytes that were just built and smoke-tested here —
          # a per-leg rebuild would technically be a different artifact, and
          # would race ahead even when this job's smoke test failed.
          # Only consumed by the e2e job minutes later; no reason to hold
          # ~50 MB against the artifact quota for the default 90 days.
          retention-days: 1

  e2e:
    # Runs `pytest -m e2e` against the exact image docker-build produced
    # (downloaded, not rebuilt — see that job's save step), on both ends of
    # the supported HA range, mirroring the pytest job's matrix. The
    # container tests themselves don't import HA, but the e2e marker also
    # carries HA-dependent slow tests (e.g. test_integration's 16-module
    # scale test), and the test driver's own dependencies (paho-mqtt et al.)
    # differ between lockfiles — running both legs post-build keeps the
    # coverage the old pre-build e2e had without giving up artifact fidelity.
    name: "e2e (${{ matrix.ha-version }})"
    runs-on: "ubuntu-latest"
    # Needs pytest explicitly, not just transitively through docker-build:
    # docker-build no longer depends on pytest (see that job's comment), so
    # without this a failing unit suite wouldn't stop e2e from running.
    needs: [pytest, docker-build]
    # Checks pytest/docker-build's own result rather than the bare
    # success() shorthand: pytest/docker-build's own conditions (above)
    # already fully encode skip-ci's effect — whenever skip-ci legitimately
    # skips them (non-release) or bails on them (a confirmed release; see
    # tests-finished below), their result is "skipped", not "success", so
    # this alone still correctly skips e2e in every skip-ci case without
    # needing its own copy of the skip-ci/detect-release logic.
    if: "needs.pytest.result == 'success' && needs.docker-build.result == 'success'"
    strategy:
      fail-fast: false
      matrix:
        include:
          # python-version: see the pytest job's matrix comment — tracks
          # each lockfile's own homeassistant requires-python floor.
          - ha-version: current
            lockfile: requirements_dev.lock.txt
            python-version: "3.14"
          - ha-version: min
            lockfile: requirements_dev_min.lock.txt
            python-version: "3.13"
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: sidecar-image
          path: /tmp
      - name: Load the built sidecar image
        run: docker load -i /tmp/pylon2mqtt-ci.tar.gz
      - uses: "./.github/actions/setup-python-env"
        with:
          python-version: ${{ matrix.python-version }}
          lockfile: ${{ matrix.lockfile }}
      - name: Run e2e tests against the built image
        # E2E_SIDECAR_IMAGE makes the compose stack (docker/
        # docker-compose.test.yml) run the loaded image as-is instead of
        # rebuilding — asserting on the shipped artifact (Dockerfile COPY
        # list, pinned runtime and deps, non-root /data access, PID-1
        # SIGTERM) is the whole point of this job. The stub/broker images
        # are test fixtures, not artifacts, so compose still builds/pulls
        # those on the fly.
        env:
          E2E_SIDECAR_IMAGE: pylon2mqtt:ci
        run: pytest -m e2e

  tests-finished:
    # Branch protection needs one fixed required-status-check context per
    # workflow (mirroring hacs.yaml/hassfest.yaml, which each only have one
    # job and so already look like this for free). tests.yaml has seven
    # real jobs, three of them matrixed (pytest, e2e, codeql-analyze) — a
    # job-level skip never expands a matrix, so a skipped pytest/e2e/
    # codeql-analyze never posts under "pytest (current)"/"e2e (min)"/
    # "codeql-analyze (python)" etc. (those literal names only come into
    # existence once the matrix actually runs), which would leave a
    # skip-ci PR permanently blocked waiting on names that never appear.
    # No `name:` override here (unlike hacs.yaml/hassfest.yaml's jobs) so
    # this doesn't display as "Tests / Tests" against the workflow's own
    # name.
    #
    # Skips at the job level (→ a real "skipped" conclusion, matching the
    # seven jobs it summarizes, which all skip the same way) in the one
    # legitimate case: skip-ci is set AND detect-release confirmed this is
    # NOT a release. Every other combination still dispatches this job —
    # see hacs.yaml's validate job for the full reasoning (same formula):
    # a confirmed release needs to hit the bail step below (this is
    # branch protection's actual required context, so it's the one place
    # that has to fail loudly instead of the seven jobs' quiet skip being
    # mistaken for "all good"); an unconfirmed verdict fails closed to
    # checking the real results below; !cancelled() backs this off if a
    # second triggering event superseded this run, rather than reporting
    # a spurious FAILURE from a run that's about to be discarded (as
    # happened once with the old always()-based version of this job).
    runs-on: "ubuntu-latest"
    needs: [detect-release, pytest, lint, docker-build, meta-lint, e2e, codeql-analyze, codeql-gate]
    if: "!cancelled() && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    steps:
      - name: Refuse skip-ci on a release PR
        if: needs.detect-release.outputs.is_release == 'true' && needs.detect-release.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR — remove the label so this job runs normally before it auto-releases."
          exit 1
      - name: Check all required jobs passed or were skipped
        run: |
          for r in "${{ needs.pytest.result }}" "${{ needs.lint.result }}" \
                   "${{ needs.docker-build.result }}" "${{ needs.meta-lint.result }}" \
                   "${{ needs.e2e.result }}" "${{ needs.codeql-analyze.result }}" \
                   "${{ needs.codeql-gate.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required job did not pass (result: $r)"
              exit 1
            fi
          done
