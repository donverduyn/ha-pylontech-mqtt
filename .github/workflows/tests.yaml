name: Tests

on:
  # No push:master trigger: master commits are already covered by the
  # pull_request run on the PR that merged them (required by branch
  # protection).
  # Deliberately NOT adding labeled/unlabeled here (tried once, reverted):
  # `gh pr create --label` fires opened and labeled as two separate events
  # for the same commit, since GitHub has no atomic "create pre-labeled"
  # mutation — with both types listed, that one `gh` call doubled every job
  # below. detect-release's live `gh pr view` lookup (see its comment) is
  # what makes dropping labeled/unlabeled safe: a label attached moments
  # after opened/synchronize/reopened fires is still visible to *this* run
  # once its live-check step executes a few seconds in, so the common case
  # (labeling at/near creation) keeps working with only one run. The
  # one capability this trades away: relabeling a PR *after* its most
  # recent run already finished no longer alone produces a fresh result —
  # closing/reopening the PR (still in types) or pushing an empty commit
  # does.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  # pull-requests: read lets detect-release look up the PR's *current*
  # labels via `gh pr view` instead of trusting github.event.pull_request.
  # labels — see that job's comment for why.
  pull-requests: read

concurrency:
  # cancel-in-progress cancels a *stale* run for this PR (e.g. a new push
  # superseding the previous push's run) — safe now that labeled/unlabeled
  # can't trigger this workflow at all, so there's no longer a label-kind
  # run that a cancellation could clash with (see the "on" comment above).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Every real job below (pytest/lint/docker-build/meta-lint/e2e) is gated
# on the "skip-ci" PR label so a maintainer can fast-track a merge (e.g.
# an environment-settings-only change) without waiting on the full
# matrix. A skipped job still reports a "skipped" conclusion for its
# required-status-check context, which branch protection treats as
# satisfied — it does not disable branch protection itself, so applying
# the label is the only way to bypass these checks.
# skip-ci on a release PR is refused, not silently ignored: a version
# bump merged to master auto-releases via autorelease.yaml with no
# further checks downstream, so that's the one PR shape that must never
# skip CI, and it must fail loudly rather than quietly fall back to
# running everything (which would look identical to a normal PR in the
# checks list, easy to miss). So each real job's condition reads "skip
# only if the label is set AND this is confirmed not a release";
# anything else — no label, an unconfirmed verdict (detect-release itself
# failed), or skip-ci on a *confirmed* release — still dispatches the
# job. The confirmed-release case is caught by an explicit early bail
# step (see detect-release and tests-finished below), not by silently
# running the real steps.
# (The env context isn't available in job-level `if:`, so this condition
# is duplicated on each job below rather than defined once.)

jobs:
  detect-release:
    # Whether this PR bumps manifest.json's version — i.e. whether merging
    # it will auto-release (see autorelease.yaml, which triggers off
    # exactly this diff on master). Only runs for pull_request events;
    # workflow_dispatch has no PR to diff, but that's fine — the "skip
    # only if" conditions below fall back to running checks whenever this
    # job didn't produce a confirmed is_release == 'false'.
    runs-on: "ubuntu-latest"
    if: github.event_name == 'pull_request'
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      skip_ci: ${{ steps.labels.outputs.skip_ci }}
    steps:
      - uses: "actions/checkout@v4"
      - name: Compare manifest.json version against the PR base
        id: check
        run: |
          manifest="custom_components/pylontech_mqtt/manifest.json"
          new="$(jq -r .version "$manifest")"
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          old="$(git show FETCH_HEAD:"$manifest" 2>/dev/null | jq -r .version || echo "")"
          if [ "$new" = "$old" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Look up the skip-ci label live
        # github.event.pull_request.labels is a snapshot frozen at whichever
        # event triggered *this* run — a label attached a moment after that
        # (e.g. `gh pr create --label`, whose create and add-label calls are
        # two separate API calls) isn't in it. Since labeled/unlabeled don't
        # trigger a run of their own (see the "on" comment above), this live
        # API lookup is the only way this run can still see a label that
        # landed just after it started: as long as it arrives before this
        # step executes (checkout + step startup — normally a few seconds),
        # it's visible here even though no second event fires.
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' \
              | grep -qx 'skip-ci'; then
            echo "skip_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Refuse skip-ci on a release PR
        # Early, fast (~4s) signal only — this job's own pass/fail isn't
        # a required status check, so tests-finished below independently
        # repeats this exact check and is what actually fails the PR.
        if: steps.check.outputs.is_release == 'true' && steps.labels.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR (manifest.json version changed against the base branch) — remove the label so the normal checks run before this auto-releases."
          exit 1

  pytest:
    name: "pytest (${{ matrix.ha-version }})"
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # Skips only in the one legitimate case: skip-ci is set AND
    # detect-release confirmed this is NOT a release. Every other
    # combination — no label, an unconfirmed verdict, or skip-ci on a
    # *confirmed* release — still dispatches this job. See the top-of-file
    # comment and tests-finished below for why a confirmed release doesn't
    # just skip quietly.
    # The leading !cancelled() matters even though this job doesn't want
    # to unconditionally run: a job's `if:` is implicitly ANDed with
    # success() of its `needs` unless the condition itself calls
    # always()/success()/failure()/cancelled() — without it, this job
    # would silently be skipped by GitHub outright whenever detect-release
    # fails for *any* reason (including a plain network flake), which is
    # the opposite of "fails closed to running the checks".
    # !cancelled() specifically rather than always(): always() would also
    # keep this job racing to completion even when detect-release was
    # itself cancelled — which happens when a new push to this PR
    # supersedes this whole run via the concurrency group above. In that
    # case the run is already being torn down; !cancelled() correctly backs
    # this job off too instead of burning several minutes running pytest
    # for real just to have the result discarded a moment later.
    if: "!cancelled() && (needs.detect-release.outputs.skip_ci != 'true' || needs.detect-release.outputs.is_release == '')"
    strategy:
      fail-fast: false
      matrix:
        include:
          # "current" tracks whatever HA version requirements_dev.lock.txt
          # was last compiled against; "min" pins the version declared in
          # hacs.json ("homeassistant": "2025.4.0"; see
          # requirements_dev_min.txt for why every release between 2024.11
          # and 2025.4.0 is uninstallable or incompatible) so a change that
          # only works on newer HA gets caught here instead of by a user
          # still on the declared minimum.
          #
          # python-version tracks each lockfile's own homeassistant pin's
          # requires-python floor (current: 2026.7.1 needs >=3.14.2; min:
          # 2025.4.0 needs >=3.13.2) rather than being a single shared
          # value — HA bumped its own minimum Python version partway
          # through the "current" range this project supports.
          - ha-version: current
            lockfile: requirements_dev.lock.txt
            python-version: "3.14"
          - ha-version: min
            lockfile: requirements_dev_min.lock.txt
            python-version: "3.13"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          cache-dependency-glob: ${{ matrix.lockfile }}
      - name: Cache installed venv
        # setup-uv's cache-dependency-glob above only caches downloaded
        # packages; `uv pip install` still has to link/hash-verify every one
        # of them into the venv it just created (--require-hashes re-checks
        # a sha256 per package) on every run. This caches that *result* —
        # keyed on the exact lockfile content, so it's only ever wrong if
        # the lockfile changes, in which case it's a miss, not a staleness
        # bug — so a hit skips the install step below entirely.
        id: venv-cache
        uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles(matrix.lockfile) }}
      - name: Install dependencies (HA ${{ matrix.ha-version }})
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv pip install --require-hashes -r ${{ matrix.lockfile }}
      - name: Run test suite
        # --cov-fail-under is a non-regression floor (current combined coverage is
        # ~89%), not a target — it catches a change that quietly drops coverage,
        # not a mandate to hit 100%. Scoped to custom_components + docker since
        # that's the shipped code; scripts/ (e2e-only helpers) is excluded.
        # No e2e here: the e2e suite runs against the *built* sidecar image,
        # so it lives in the e2e job below, downstream of docker-build.
        run: >
          pytest --cov=custom_components --cov=docker
          --cov-report=term-missing --cov-fail-under=88

  lint:
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: "!cancelled() && (needs.detect-release.outputs.skip_ci != 'true' || needs.detect-release.outputs.is_release == '')"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          # Matches the pytest job's "current" leg: requirements_dev.lock.txt
          # now pins homeassistant==2026.7.1, which requires Python >=3.14.2.
          python-version: "3.14"
          activate-environment: true
          cache-dependency-glob: requirements_dev.lock.txt
      - name: Cache installed venv
        # See the pytest job's identically-named step for why this exists.
        id: venv-cache
        uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements_dev.lock.txt') }}
      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv pip install --require-hashes -r requirements_dev.lock.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Pyright
        run: pyright
      - name: Cache mypy incremental cache
        # Keyed on mypy's pinned version (via the lockfile hash) plus this
        # commit's sha so every run always saves a fresh cache entry; the
        # restore-keys prefix match falls back to the closest previous run's
        # cache so mypy's incremental mode only re-checks files that changed
        # since then instead of the whole project cold.
        uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('requirements_dev.lock.txt') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('requirements_dev.lock.txt') }}-
      - name: Mypy
        run: mypy
      - name: pip-audit (runtime dependencies)
        run: pip-audit -r requirements_runtime.lock.txt

  meta-lint:
    # Lints the project's own tooling (workflows, shell scripts, Dockerfile)
    # rather than its Python code — separate job so a failure here doesn't
    # block on/get confused with the `lint` job's Python-specific tools.
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: "!cancelled() && (needs.detect-release.outputs.skip_ci != 'true' || needs.detect-release.outputs.is_release == '')"
    steps:
      - uses: "actions/checkout@v4"
      - name: Install actionlint
        # ubuntu-latest doesn't ship actionlint, unlike shellcheck below.
        # Downloaded and checksum-verified directly (pinned release asset)
        # rather than via a third-party wrapper action, to match this repo's
        # existing preference for pinned, minimal-trust-surface CI steps.
        run: |
          curl -sSfLo /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" | sha256sum -c
          tar xzf /tmp/actionlint.tar.gz -C /tmp actionlint
      - name: actionlint
        run: /tmp/actionlint -color .github/workflows/*.yaml
      - name: ShellCheck
        # Preinstalled on ubuntu-latest runners; covers every shell script in
        # the repo (docker/Dockerfile has no other shell to lint).
        run: |
          shellcheck scripts/clean.sh \
            .devcontainer/postCreate.sh \
            .devcontainer/seedHostConfig.sh \
            .devcontainer/syncConfigOut.sh
      - name: Install Hadolint
        run: |
          curl -sSfLo /tmp/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-linux-x86_64
          echo "6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47  /tmp/hadolint" | sha256sum -c
          chmod +x /tmp/hadolint
      - name: Hadolint
        run: /tmp/hadolint docker/Dockerfile docker/Dockerfile.stub

  docker-build:
    # Runs concurrently with pytest rather than gated behind it: pytest
    # (~40s) is slower than this job (~20s), so waiting for it serially
    # would only lengthen the critical path on the common (green) path
    # without pytest's fast-fail ever actually saving time here. e2e (below)
    # still requires *both* pytest and this job to succeed before it runs,
    # so a failing unit suite still short-circuits before the expensive e2e
    # stage — it just no longer blocks this cheap build+smoke-test from
    # starting. No trivy/SBOM here — those describe shipped artifacts, so
    # they live in release.yaml against the image actually being published.
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # See pytest's identical condition/comment above.
    if: "!cancelled() && (needs.detect-release.outputs.skip_ci != 'true' || needs.detect-release.outputs.is_release == '')"
    steps:
      - uses: "actions/checkout@v4"
      - name: Build the sidecar image
        run: |
          docker build -f docker/Dockerfile \
            --build-arg GIT_SHA="${{ github.sha }}" \
            --build-arg SIDECAR_VERSION="ci-${{ github.sha }}" \
            -t pylon2mqtt:ci .
      - name: Smoke test the built image
        # Cheap fail-fast before the image is shipped off to the e2e job's
        # compose stack: proves it runs under its pinned Python 3.13 runtime
        # (not just that `docker build` succeeds), that main.py's entry point
        # and its pinned deps (paho-mqtt, pyserial) import cleanly, and that
        # missing config fails fast (exit 1, clear log) instead of hanging
        # forever waiting on hardware that isn't there.
        run: |
          set +e
          output="$(docker run --rm pylon2mqtt:ci 2>&1)"
          code=$?
          set -e
          echo "$output"
          if [ "$code" -ne 1 ]; then
            echo "::error::Expected exit code 1 (fail-fast config validation), got $code"
            exit 1
          fi
          if ! echo "$output" | grep -q "MQTT_BROKER environment variable is required"; then
            echo "::error::Expected fail-fast MQTT_BROKER validation message was not logged"
            exit 1
          fi
      - name: Save the image for the e2e job
        # `docker save` + artifact (rather than each e2e matrix leg running
        # its own `docker build`) so both legs assert against the *identical*
        # bytes that were just built and smoke-tested here — a per-leg
        # rebuild would technically be a different artifact, and would race
        # ahead even when this job's smoke test failed.
        run: docker save pylon2mqtt:ci | gzip > /tmp/pylon2mqtt-ci.tar.gz
      - uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: sidecar-image
          path: /tmp/pylon2mqtt-ci.tar.gz
          # Only consumed by the e2e job minutes later; no reason to hold
          # ~50 MB against the artifact quota for the default 90 days.
          retention-days: 1

  e2e:
    # Runs `pytest -m e2e` against the exact image docker-build produced
    # (downloaded, not rebuilt — see that job's save step), on both ends of
    # the supported HA range, mirroring the pytest job's matrix. The
    # container tests themselves don't import HA, but the e2e marker also
    # carries HA-dependent slow tests (e.g. test_integration's 16-module
    # scale test), and the test driver's own dependencies (paho-mqtt et al.)
    # differ between lockfiles — running both legs post-build keeps the
    # coverage the old pre-build e2e had without giving up artifact fidelity.
    name: "e2e (${{ matrix.ha-version }})"
    runs-on: "ubuntu-latest"
    # Needs pytest explicitly, not just transitively through docker-build:
    # docker-build no longer depends on pytest (see that job's comment), so
    # without this a failing unit suite wouldn't stop e2e from running.
    needs: [pytest, docker-build]
    # Checks pytest/docker-build's own result rather than the bare
    # success() shorthand: pytest/docker-build's own conditions (above)
    # already fully encode skip-ci's effect — whenever skip-ci legitimately
    # skips them (non-release) or bails on them (a confirmed release; see
    # tests-finished below), their result is "skipped", not "success", so
    # this alone still correctly skips e2e in every skip-ci case without
    # needing its own copy of the skip-ci/detect-release logic.
    if: "needs.pytest.result == 'success' && needs.docker-build.result == 'success'"
    strategy:
      fail-fast: false
      matrix:
        include:
          # python-version: see the pytest job's matrix comment — tracks
          # each lockfile's own homeassistant requires-python floor.
          - ha-version: current
            lockfile: requirements_dev.lock.txt
            python-version: "3.14"
          - ha-version: min
            lockfile: requirements_dev_min.lock.txt
            python-version: "3.13"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: sidecar-image
          path: /tmp
      - name: Load the built sidecar image
        run: docker load -i /tmp/pylon2mqtt-ci.tar.gz
      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          cache-dependency-glob: ${{ matrix.lockfile }}
      - name: Cache installed venv
        # See the pytest job's identically-named step for why this exists.
        id: venv-cache
        uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles(matrix.lockfile) }}
      - name: Install dependencies (HA ${{ matrix.ha-version }})
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv pip install --require-hashes -r ${{ matrix.lockfile }}
      - name: Run e2e tests against the built image
        # E2E_SIDECAR_IMAGE makes the compose stack (docker/
        # docker-compose.test.yml) run the loaded image as-is instead of
        # rebuilding — asserting on the shipped artifact (Dockerfile COPY
        # list, pinned runtime and deps, non-root /data access, PID-1
        # SIGTERM) is the whole point of this job. The stub/broker images
        # are test fixtures, not artifacts, so compose still builds/pulls
        # those on the fly.
        env:
          E2E_SIDECAR_IMAGE: pylon2mqtt:ci
        run: pytest -m e2e

  tests-finished:
    # Branch protection needs one fixed required-status-check context per
    # workflow (mirroring hacs.yaml/hassfest.yaml, which each only have one
    # job and so already look like this for free). tests.yaml has five real
    # jobs, two of them matrixed (pytest, e2e) — a job-level skip never
    # expands a matrix, so a skipped pytest/e2e never posts under
    # "pytest (current)"/"pytest (min)"/"e2e (current)"/"e2e (min)" (those
    # literal names only come into existence once the matrix actually
    # runs), which would leave a skip-ci PR permanently blocked waiting on
    # names that never appear. No `name:` override here (unlike
    # hacs.yaml/hassfest.yaml's jobs) so this doesn't display as "Tests /
    # Tests" against the workflow's own name.
    #
    # Skips at the job level (→ a real "skipped" conclusion, matching the
    # five jobs it summarizes, which all skip the same way) in the one
    # legitimate case: skip-ci is set AND detect-release confirmed this is
    # NOT a release. Every other combination still dispatches this job —
    # see hacs.yaml's validate job for the full reasoning (same formula):
    # a confirmed release needs to hit the bail step below (this is
    # branch protection's actual required context, so it's the one place
    # that has to fail loudly instead of the five jobs' quiet skip being
    # mistaken for "all good"); an unconfirmed verdict fails closed to
    # checking the real results below; !cancelled() backs this off if a
    # second triggering event superseded this run, rather than reporting
    # a spurious FAILURE from a run that's about to be discarded (as
    # happened once with the old always()-based version of this job).
    runs-on: "ubuntu-latest"
    needs: [detect-release, pytest, lint, docker-build, meta-lint, e2e]
    if: "!cancelled() && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    steps:
      - name: Refuse skip-ci on a release PR
        if: needs.detect-release.outputs.is_release == 'true' && needs.detect-release.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR — remove the label so this job runs normally before it auto-releases."
          exit 1
      - name: Check all required jobs passed or were skipped
        run: |
          for r in "${{ needs.pytest.result }}" "${{ needs.lint.result }}" \
                   "${{ needs.docker-build.result }}" "${{ needs.meta-lint.result }}" \
                   "${{ needs.e2e.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required job did not pass (result: $r)"
              exit 1
            fi
          done
