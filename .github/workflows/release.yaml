name: Release

# Runs for a version tag either pushed by hand (v2.0.0-rc1 style
# prereleases stay a manual act) or created by autorelease.yaml when a
# manifest.json version bump lands on master. The two entry points exist
# because tags created with the built-in GITHUB_TOKEN deliberately do not
# trigger other workflows — autorelease must call this one directly
# (workflow_call, passing the tag as an input) rather than relying on its
# just-created tag firing the push trigger below.
#
# Builds the sidecar image with the tag baked in as SIDECAR_VERSION and the
# triggering commit as GIT_SHA (see docker/Dockerfile's ARGs and
# docker/main.py's diagnostics fields), e2e-gates that exact image, pushes
# it to GHCR under that version, and publishes a matching GitHub Release —
# this is what lets a user pair a specific HACS release with a specific,
# reproducible sidecar image instead of both floating on an unversioned
# "2.0.0" that every commit shares.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag:
        description: "The v-prefixed release tag to build and publish (must already exist)"
        required: true
        type: string

permissions: {}

jobs:
  release:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      packages: write
    steps:
      - uses: "actions/checkout@v4"
        with:
          # On a tag push, inputs.tag is empty and this resolves to the tag
          # ref itself; via workflow_call it pins the checkout to the tag
          # the caller just created, so a master that has already moved on
          # can't leak newer commits into the release build.
          ref: ${{ inputs.tag || github.ref }}

      - name: Derive version from tag
        id: version
        # Anything with a hyphen (e.g. v2.0.0-rc1) is a pre-release —
        # real-hardware validation gaps mean nothing ships as a final
        # release until that's been done (see CONTRIBUTING.md). base_version
        # strips that suffix for comparison against manifest.json, which only
        # ever carries the plain release number a prerelease is a candidate for.
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-$GITHUB_REF_NAME}"
          version="${tag#v}"
          base_version="${version%%-*}"
          if [[ "${version}" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "base_version=${base_version}"
            echo "is_prerelease=${is_prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          manifest_version="$(jq -r .version custom_components/pylontech_mqtt/manifest.json)"
          if [ "${{ steps.version.outputs.base_version }}" != "$manifest_version" ]; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} (base version ${{ steps.version.outputs.base_version }}) does not match manifest.json version ${manifest_version}"
            exit 1
          fi

      - uses: "docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0" # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build → e2e → push, in that order: the image is loaded into the local
      # daemon (push: false) so the exact bytes that will be published get
      # e2e-tested first, and a red e2e means nothing reaches the registry at
      # all. Previously this step pushed directly, so a tagged release
      # shipped an untested build — one that wasn't even the same artifact CI
      # had e2e-tested on the merge commit.
      - uses: "docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a" # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            SIDECAR_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: "3.13"
          activate-environment: true
          cache-dependency-glob: requirements_dev.lock.txt
      - name: Install dependencies (for the e2e gate)
        run: uv pip install --require-hashes -r requirements_dev.lock.txt
      - name: Run e2e against the release image (gate)
        # Same harness as tests.yaml's e2e job: E2E_SIDECAR_IMAGE makes the
        # compose stack (docker/docker-compose.test.yml) run the loaded
        # release image as-is instead of rebuilding it.
        env:
          E2E_SIDECAR_IMAGE: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
        run: pytest -m e2e

      - name: Push the tested image
        # Plain `docker push` of the already-loaded tag, not a second
        # build-push-action pass: what lands in GHCR is byte-for-byte the
        # image the e2e gate just ran, not a cache-assisted rebuild of it.
        run: docker push "ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"

      # Separate, conditional step rather than a second line in the tags list
      # above: retagging the already-pushed digest is enough, no rebuild
      # needed, and skipping it outright for prereleases is unambiguous —
      # tagging ":latest" unconditionally previously let a v2.0.0-rc1 push
      # overwrite the production "latest" tag with an unvalidated build.
      - name: Tag latest (non-prerelease only)
        if: steps.version.outputs.is_prerelease == 'false'
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${{ github.repository }}:latest" \
            "ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"

      - uses: "softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b" # v3.0.1
        with:
          # Explicit rather than inferred from the run's ref: under
          # workflow_call the ref is the master push that triggered
          # autorelease, not the tag being released.
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.is_prerelease }}
