name: PR Auto-merge

# Branch freshness and merge eligibility are deliberately separate. Every
# default-branch push updates every open PR: Dependabot branches are rebased,
# while human branches receive a non-destructive merge update. Schedule and
# manual events provide recovery runs.
#
# Automatic Dependabot merging is narrower. Only grouped patch/minor updates
# enter a single-flight queue, with exactly one group allowed to have
# auto-merge enabled. When that group merges, the resulting default-branch
# push refreshes all remaining PRs and activates the next eligible group.
# Single-dependency Dependabot PRs are kept current but never auto-merged:
# exact HA/phacc pin collisions are expected to fail, and major updates remain
# manual. Failed groups are skipped so they cannot block another ecosystem.
#
# Ordinary contributor PRs retain the slower policy: the weekly maintenance
# run enables auto-merge after seven full days. Required checks, reviews, and
# mergeability remain final gates for every automatic merge.
#
# workflow_run reacts after Tests completes, but always executes this trusted
# default-branch workflow and never checks out PR code with a write token.
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
  workflow_run:
    workflows:
      - "Tests"
    types:
      - completed
  schedule:
    # Monday 08:22 UTC; after dependency-updates.yaml (08:17) and well ahead
    # of close-stale-automation-prs.yaml (08:50) — a wide buffer so a
    # delayed scheduled run (GitHub Actions gives no start-time guarantee)
    # still lands before staleness is evaluated.
    - cron: "22 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-open-pr-branches:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

      - name: Update every open PR branch
        env:
          # App-authenticated branch updates trigger ordinary pull_request CI;
          # updates made with GITHUB_TOKEN would suppress those follow-up runs.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: .github/scripts/update-open-pr-branches.sh

  queue-dependabot-group:
    needs: update-open-pr-branches
    if: >-
      always() &&
      (needs.update-open-pr-branches.result == 'success' ||
       needs.update-open-pr-branches.result == 'skipped')
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

      - name: Activate one eligible Dependabot group PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: .github/scripts/queue-dependabot-group.sh

  auto-merge-aged-regular-prs:
    # A workflow_run event is useful only for Dependabot's immediate path
    # above. Ordinary PRs become eligible because time passes, so scan them
    # on the weekly schedule (and allow a manual recovery run).
    needs: update-open-pr-branches
    if: >-
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.update-open-pr-branches.result == 'success'
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for regular PRs open at least seven days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          now="$(date +%s)"
          cutoff=$(( now - 7 * 86400 ))
          default_branch="$(gh repo view "$REPO" --json defaultBranchRef --jq .defaultBranchRef.name)"
          prs="$(gh pr list --repo "$REPO" --base "$default_branch" --state open --limit 1000 \
            --json number,url,author,headRefName,createdAt,isDraft)"

          if [ "$(echo "$prs" | jq 'length')" = "0" ]; then
            echo "No open PRs targeting $default_branch."
            exit 0
          fi

          while read -r pr; do
            number="$(echo "$pr" | jq -r .number)"
            url="$(echo "$pr" | jq -r .url)"
            author="$(echo "$pr" | jq -r '.author.login // ""')"
            head_ref="$(echo "$pr" | jq -r .headRefName)"
            created_at="$(echo "$pr" | jq -r .createdAt)"
            is_draft="$(echo "$pr" | jq -r .isDraft)"

            if [ "$is_draft" = "true" ]; then
              echo "PR #$number: draft — leaving for its author."
              continue
            fi
            if [[ "$author" == *"[bot]" ]] || [[ "$author" == app/* ]] || [[ "$head_ref" == automation/* ]]; then
              echo "PR #$number: bot/automation PR — governed by its dedicated policy."
              continue
            fi

            created_epoch="$(date -d "$created_at" +%s)"
            age_days=$(( ( now - created_epoch ) / 86400 ))
            if [ "$created_epoch" -gt "$cutoff" ]; then
              echo "PR #$number: open $age_days days — not eligible yet."
              continue
            fi

            echo "PR #$number: open $age_days days — enabling auto-merge."
            gh pr merge --auto --squash "$url" \
              || echo "  could not enable auto-merge — merge requirements or conflicts still block it."
          done < <(echo "$prs" | jq -c '.[]')
