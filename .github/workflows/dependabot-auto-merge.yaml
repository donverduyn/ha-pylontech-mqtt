name: Dependabot Auto-merge

# Dependabot's own security-update PRs (CVE-driven, separate from
# dependency-updates.yaml's own bulk uv refresh — see
# close-stale-automation-prs.yaml's top comment) had no merge path at all
# before this workflow existed: they either got closed as a known
# min-HA-version-floor conflict, closed once stale, or just sat open until
# a human noticed. This closes that gap for the common, low-risk case —
# patch/minor bumps — the same way dependency-updates.yaml auto-merges its
# own PR.
#
# Deliberately excludes major bumps: those can carry breaking API changes
# that passing tests don't necessarily cover, so they still need a human to
# look at the diff before merging.
#
# No explicit min-HA-version-floor check is needed here: a PR that
# conflicts with the frozen floor (requirements_dev_min.txt) simply never
# passes tests-finished/HACS Action/validate, so `gh pr merge --auto` has
# nothing to act on — it stays open (and pending) until
# close-stale-automation-prs.yaml eventually retires it.
#
# schedule/workflow_dispatch only — deliberately NOT pull_request_target.
# This used to fire on every PR open/synchronize/reopen so auto-merge got
# enabled immediately rather than waiting up to a week. Reworked to run
# only on the weekly cadence below, in the same pass as the branch-rebase
# step: enabling auto-merge a few days late costs nothing (the PR just
# merges once this job next runs and checks are green), and running
# exclusively on a schedule means this workflow's behavior no longer
# depends on Dependabot's own PR-event timing at all.
#
# This also sidesteps the read-only-GITHUB_TOKEN restriction that
# Dependabot-authored `pull_request` events carry (see this repo's
# project_gha_gotchas memory, point 4) — that restriction is specific to
# runs *triggered by* a pull_request/pull_request_target event, not to
# what a schedule-triggered run's API calls target. A schedule/
# workflow_dispatch run gets the full token from this file's `permissions:`
# block regardless of which PRs it then acts on, so there's no need for
# pull_request_target's write-token workaround at all once nothing here
# reacts to PR events directly.
#
# Dropping pull_request_target also drops dependabot/fetch-metadata, since
# that action reads `github.event.pull_request` to determine the semver
# update type — a field that only exists on pull_request-family events.
# Instead, update type is derived from the compatibility-score badge
# Dependabot embeds in every PR body (a Markdown image link containing
# `previous-version=X&new-version=Y` per dependency): extract those pairs
# and compare each pair's leading major-version segment. A PR with no
# badge, or any dependency whose major segment changed, is treated as a
# major bump and skipped — conservative by design, matching the "only the
# common low-risk case" scope above.
on:
  workflow_dispatch:
  schedule:
    # Monday 08:22 UTC; after dependency-updates.yaml (08:17) and well ahead
    # of close-stale-automation-prs.yaml (08:50) — a wide buffer so a
    # delayed scheduled run (GitHub Actions gives no start-time guarantee)
    # still lands before staleness is evaluated.
    - cron: "22 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  maintain-dependabot-prs:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge and rebase every open Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          is_major_bump() {
            # Reads $body from the caller's scope. Echoes "true"/"false".
            local badges major_bump prev new prev_major new_major
            badges="$(grep -oP 'previous-version=[^&]+&new-version=[^&\s")]+' <<<"$body" || true)"
            if [ -z "$badges" ]; then
              echo "true" # no compatibility metadata at all — be conservative
              return
            fi
            major_bump="false"
            while IFS= read -r badge; do
              prev="$(grep -oP 'previous-version=\K[^&]+' <<<"$badge")"
              new="$(grep -oP 'new-version=\K[^&\s")]+' <<<"$badge")"
              prev_major="$(grep -oP '^v?\K\d+' <<<"$prev" || true)"
              new_major="$(grep -oP '^v?\K\d+' <<<"$new" || true)"
              if [ -z "$prev_major" ] || [ -z "$new_major" ] || [ "$prev_major" != "$new_major" ]; then
                major_bump="true"
              fi
            done <<<"$badges"
            echo "$major_bump"
          }

          prs="$(gh pr list --repo "$REPO" --state open --json number,author,url,createdAt \
            --jq '[.[] | select(.author.login == "dependabot[bot]" or .author.login == "app/dependabot")] | sort_by(.createdAt)')"
          count="$(echo "$prs" | jq 'length')"
          if [ "$count" = "0" ]; then
            echo "No open Dependabot PRs."
            exit 0
          fi

          # Process substitution (< <(...)), not a `| while` pipe: a piped
          # while loop runs in a subshell, where a mid-loop failure under
          # `set -e` would only terminate that subshell, silently skipping
          # the rest of the queue instead of failing the job.
          while read -r pr; do
            number="$(echo "$pr" | jq -r .number)"
            url="$(echo "$pr" | jq -r .url)"

            body="$(gh pr view "$number" --repo "$REPO" --json body --jq .body)"
            if [ "$(is_major_bump)" = "false" ]; then
              echo "PR #$number: patch/minor — enabling auto-merge."
              # Not fatal on failure (e.g. already merged/closed by the time
              # this runs, or a real merge conflict): one PR's failure here
              # must not abort the loop and skip every later PR's rebase.
              gh pr merge --auto --squash "$url" || echo "  could not enable auto-merge — leaving for manual review."
            else
              echo "PR #$number: major bump (or no compatibility metadata) — leaving for manual review."
            fi

            echo "PR #$number: attempting rebase..."
            if gh api "repos/$REPO/pulls/$number/update-branch" -X PUT >/dev/null 2>&1; then
              echo "  updated."
            else
              echo "  already up to date, or has a real conflict — leaving as-is."
            fi
          done < <(echo "$prs" | jq -c '.[]')
