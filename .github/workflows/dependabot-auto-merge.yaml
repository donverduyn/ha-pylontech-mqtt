name: PR Auto-merge

# Dependabot's own security-update PRs (CVE-driven, separate from
# dependency-updates.yaml's own bulk uv refresh — see
# close-stale-automation-prs.yaml's top comment) had no merge path at all
# before this workflow existed: they either got closed as a known
# min-HA-version-floor conflict, closed once stale, or just sat open until
# a human noticed. This closes that gap for the common, low-risk case —
# patch/minor bumps — the same way dependency-updates.yaml auto-merges its
# own PR.
#
# Ordinary contributor PRs use a deliberately slower path in this same
# workflow: once a non-draft PR has been open for seven full days, the weekly
# maintenance run enables auto-merge. GitHub's required checks, reviews, and
# mergeability rules remain the final gate; `--auto` does not bypass them.
# Bot-authored PRs and `automation/*` branches are excluded from this path:
# Dependabot is governed by the policy below, dependency-updates already
# enables auto-merge when it opens its PR, and min-ha-version-update is
# intentionally manual.
#
# Deliberately excludes major bumps: those can carry breaking API changes
# that passing tests don't necessarily cover, so they still need a human to
# look at the diff before merging.
#
# No explicit min-HA-version-floor check is needed here: a PR that
# conflicts with the frozen floor (requirements_dev_min.txt) simply never
# passes tests-finished/HACS Action/validate, so `gh pr merge --auto` has
# nothing to act on — it stays open (and pending) until
# close-stale-automation-prs.yaml eventually retires it.
#
# workflow_run wakes this job as soon as Tests finishes for a Dependabot PR,
# so an eligible update gets auto-merge enabled within minutes instead of
# waiting for the weekly maintenance pass. The job still runs from the
# trusted default-branch copy of this workflow and only checks out that
# trusted branch; it never executes code from the Dependabot PR with its
# write token.
#
# workflow_run also sidesteps the read-only-GITHUB_TOKEN restriction that
# Dependabot-authored pull_request events carry: this follow-up run gets the
# permissions below from the default branch. workflow_dispatch and the
# weekly schedule remain recovery paths if a Tests run is skipped or its
# completion event is delayed.
#
# Dropping pull_request_target also drops dependabot/fetch-metadata, since
# that action reads `github.event.pull_request` to determine the semver
# update type — a field that only exists on pull_request-family events.
# Instead, update type comes from .github/scripts/dependabot-bump-kind.sh
# (shared with close-stale-automation-prs.yaml's exemption check) — "major"
# or "unknown" is treated as a major bump and skipped here, conservative by
# design, matching the "only the common low-risk case" scope above.
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Tests"
    types:
      - completed
  schedule:
    # Monday 08:22 UTC; after dependency-updates.yaml (08:17) and well ahead
    # of close-stale-automation-prs.yaml (08:50) — a wide buffer so a
    # delayed scheduled run (GitHub Actions gives no start-time guarantee)
    # still lands before staleness is evaluated.
    - cron: "22 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  maintain-dependabot-prs:
    # workflow_dispatch/schedule sweep every open Dependabot PR. A
    # workflow_run should do that work only when Dependabot triggered the
    # upstream Tests run; ordinary contributors' test completions are no-ops.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.actor.login == 'dependabot[bot]' ||
      github.event.workflow_run.actor.login == 'app/dependabot'
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Needed only to fetch .github/scripts/dependabot-bump-kind.sh --
      # this job otherwise works entirely through the gh API against
      # $GITHUB_REPOSITORY, not the checked-out tree.
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

      - name: Enable auto-merge and rebase every open Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list --repo "$REPO" --state open --json number,author,url,title,createdAt \
            --jq '[.[] | select(.author.login == "dependabot[bot]" or .author.login == "app/dependabot")] | sort_by(.createdAt)')"
          count="$(echo "$prs" | jq 'length')"
          if [ "$count" = "0" ]; then
            echo "No open Dependabot PRs."
            exit 0
          fi

          # Process substitution (< <(...)), not a `| while` pipe: a piped
          # while loop runs in a subshell, where a mid-loop failure under
          # `set -e` would only terminate that subshell, silently skipping
          # the rest of the queue instead of failing the job.
          while read -r pr; do
            number="$(echo "$pr" | jq -r .number)"
            url="$(echo "$pr" | jq -r .url)"
            title="$(echo "$pr" | jq -r .title)"

            body="$(gh pr view "$number" --repo "$REPO" --json body --jq .body)"
            bump_kind="$(.github/scripts/dependabot-bump-kind.sh "$title" "$body")"
            if [ "$bump_kind" = "minor-or-patch" ]; then
              echo "PR #$number: patch/minor — enabling auto-merge."
              # Not fatal on failure (e.g. already merged/closed by the time
              # this runs, or a real merge conflict): one PR's failure here
              # must not abort the loop and skip every later PR's rebase.
              gh pr merge --auto --squash "$url" || echo "  could not enable auto-merge — leaving for manual review."
            else
              echo "PR #$number: $bump_kind bump — leaving for manual review."
            fi

            echo "PR #$number: attempting rebase..."
            if gh api "repos/$REPO/pulls/$number/update-branch" -X PUT >/dev/null 2>&1; then
              echo "  updated."
            else
              echo "  already up to date, or has a real conflict — leaving as-is."
            fi
          done < <(echo "$prs" | jq -c '.[]')

  auto-merge-aged-regular-prs:
    # A workflow_run event is useful only for Dependabot's immediate path
    # above. Ordinary PRs become eligible because time passes, so scan them
    # on the weekly schedule (and allow a manual recovery run).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for regular PRs open at least seven days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          now="$(date +%s)"
          cutoff=$(( now - 7 * 86400 ))
          default_branch="$(gh repo view "$REPO" --json defaultBranchRef --jq .defaultBranchRef.name)"
          prs="$(gh pr list --repo "$REPO" --base "$default_branch" --state open --limit 1000 \
            --json number,url,author,headRefName,createdAt,isDraft)"

          if [ "$(echo "$prs" | jq 'length')" = "0" ]; then
            echo "No open PRs targeting $default_branch."
            exit 0
          fi

          while read -r pr; do
            number="$(echo "$pr" | jq -r .number)"
            url="$(echo "$pr" | jq -r .url)"
            author="$(echo "$pr" | jq -r '.author.login // ""')"
            head_ref="$(echo "$pr" | jq -r .headRefName)"
            created_at="$(echo "$pr" | jq -r .createdAt)"
            is_draft="$(echo "$pr" | jq -r .isDraft)"

            if [ "$is_draft" = "true" ]; then
              echo "PR #$number: draft — leaving for its author."
              continue
            fi
            if [[ "$author" == *"[bot]" ]] || [[ "$author" == app/* ]] || [[ "$head_ref" == automation/* ]]; then
              echo "PR #$number: bot/automation PR — governed by its dedicated policy."
              continue
            fi

            created_epoch="$(date -d "$created_at" +%s)"
            age_days=$(( ( now - created_epoch ) / 86400 ))
            if [ "$created_epoch" -gt "$cutoff" ]; then
              echo "PR #$number: open $age_days days — not eligible yet."
              continue
            fi

            echo "PR #$number: open $age_days days — enabling auto-merge."
            gh pr merge --auto --squash "$url" \
              || echo "  could not enable auto-merge — merge requirements or conflicts still block it."
          done < <(echo "$prs" | jq -c '.[]')
