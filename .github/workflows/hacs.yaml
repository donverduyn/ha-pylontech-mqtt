name: HACS

on:
  # No push:master trigger: master commits are already covered by the
  # pull_request run on the PR that merged them (required by branch
  # protection). The daily schedule catches drift from HACS's own
  # validation rules changing, independent of any push here.
  # Deliberately NOT adding labeled/unlabeled here — see tests.yaml's
  # identical comment for why (in short: `gh pr create --label` fires
  # opened and labeled as two separate events for the same commit, which
  # doubled every job below; detect-release's live label lookup covers the
  # common case with only one run).
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  # See tests.yaml's identical group key for why this no longer needs an
  # event-kind suffix: labeled/unlabeled can't trigger this workflow at all.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # See detect-release.yaml for why this is a reusable-workflow call rather
  # than an inline job: tests.yaml and hassfest.yaml need the exact same two
  # signals (is_release, skip_ci) and previously each carried their own
  # identical ~40-line copy of this job to get them.
  detect-release:
    uses: ./.github/workflows/detect-release.yaml
    permissions:
      contents: read
      pull-requests: read

  validate:
    runs-on: "ubuntu-latest"
    name: HACS Action
    needs: [detect-release]
    # Skips at the job level (→ a real "skipped" conclusion, and — since
    # hacs/action is a container action — avoids GitHub pre-pulling its
    # image entirely, ~27s saved) in the one legitimate case: skip-ci is
    # set AND detect-release confirmed this is NOT a release. Every other
    # combination still dispatches the job: a confirmed release, to hit
    # the bail step below (this job is HACS Action, branch protection's
    # actual required context, so it has to fail *itself* here — a
    # release PR reaching this condition always has skip_ci == 'false' or
    # 'true' with is_release == 'true', never the 'false'+'false' pair
    # this skips on); an unconfirmed verdict, to fail closed to running
    # the real check below; and this run itself being cancelled (a second
    # triggering event superseding it) is handled by !cancelled(), not by
    # the boolean pair below — without it, a detect-release failure
    # (genuine, or this run being cancelled) would silently skip this job
    # via GitHub's implicit "skip if needs failed" default instead of
    # reaching the logic that decides skip vs. bail vs. run for real.
    if: "!cancelled() && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    steps:
      - name: Refuse skip-ci on a release PR
        # Duplicates detect-release's identical step (which only gives an
        # early signal — its own pass/fail isn't required by branch
        # protection) so *this* job explicitly fails instead of the
        # checkout/validation steps below silently proceeding as if the
        # label had been ignored. No `if:` needed on checkout/validation
        # below: this step failing already skips them via the default
        # per-step success() requirement, and it's the only way this job
        # gets dispatched without also being the real-check path.
        if: needs.detect-release.outputs.is_release == 'true' && needs.detect-release.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR — remove the label so this job runs normally before it auto-releases."
          exit 1
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@d556e736723344f83838d08488c983a15381059a" # 22.5.0
        with:
          category: "integration"
