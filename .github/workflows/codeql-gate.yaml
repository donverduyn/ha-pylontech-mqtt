name: CodeQL Gate

# Shared by autorelease.yaml (gates a release) and tests.yaml (gates a PR
# merge, and deliberately not subject to skip-ci — see tests.yaml's own
# comment on why): waits for codeql.yml's check-runs on this exact commit
# to finish, then fails if there's an open high/critical alert on this
# run's ref. codeql.yml triggers independently off the same event as
# either caller — there's no built-in ordering between separate workflow
# files, so its check-runs may not exist yet, or may still be running,
# when this starts.
#
# Reads github.sha/github.ref directly rather than taking them as inputs:
# a reusable workflow inherits the same event context as its caller, so
# these already resolve correctly per caller — refs/heads/master for
# autorelease.yaml's push event, refs/pull/<n>/merge for tests.yaml's
# pull_request event — without risking a caller passing a mismatched
# value.

on:
  workflow_call: {}

permissions: {}

jobs:
  gate:
    runs-on: "ubuntu-latest"
    # checks: read is what the check-runs API (below) actually needs — not
    # actions: read, which only covers the separate Actions/workflow-runs
    # API. Getting this wrong doesn't error, it just makes GH_TOKEN see an
    # empty check-runs list forever: confirmed live on PR #96, where the
    # "Wait for CodeQL" step looped "0 found, 0 pending" indefinitely even
    # after codeql.yml had genuinely finished, because the token couldn't
    # see its check-runs at all.
    permissions:
      security-events: read
      checks: read
    steps:
      - name: Wait for CodeQL to finish analyzing this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 600 ))
          while true; do
            runs="$(gh api "repos/$REPO/commits/$SHA/check-runs" --jq '[.check_runs[] | select(.name | startswith("Analyze ("))]')"
            count="$(echo "$runs" | jq 'length')"
            pending="$(echo "$runs" | jq '[.[] | select(.status != "completed")] | length')"
            if [ "$count" -ge 1 ] && [ "$pending" = "0" ]; then
              echo "$runs" | jq -r '.[] | "\(.name): \(.conclusion)"'
              failed="$(echo "$runs" | jq '[.[] | select(.conclusion != "success")] | length')"
              if [ "$failed" != "0" ]; then
                echo "::error::CodeQL analysis failed for $SHA — refusing until it's green."
                exit 1
              fi
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for CodeQL to finish analyzing $SHA (found $count run(s), $pending still pending) — refusing to proceed without a known scan result."
              exit 1
            fi
            echo "Waiting for CodeQL ($count found, $pending pending)..."
            sleep 15
          done

      - name: Refuse if this ref has an open high/critical CodeQL alert
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
        # Checks *all* currently-open high/critical alerts on this ref, not
        # just ones newly introduced by this push/PR — an old alert that
        # slipped in via a skip-ci merge, or one newly surfaced by the
        # weekly scheduled scan picking up an updated CodeQL query pack
        # (see codeql.yml), should block exactly as much as one this
        # commit just introduced.
        run: |
          set -euo pipefail
          # --jq '.[]' (rather than a `[...]`-wrapped filter) matters under
          # --paginate: it emits one alert object per line across all pages,
          # which `jq -s` below can slurp into a single array regardless of
          # how many pages came back — a `[...]`-wrapped filter would instead
          # print one array *per page*, concatenated as separate top-level
          # JSON values that `jq length` can't sum correctly.
          alerts="$(gh api "repos/$REPO/code-scanning/alerts" -f "ref=$REF" -f state=open --paginate --jq '.[]' \
            | jq -s '[.[] | select(.rule.security_severity_level == "high" or .rule.security_severity_level == "critical")]')"
          count="$(echo "$alerts" | jq 'length')"
          if [ "$count" != "0" ]; then
            echo "$alerts" | jq -r '.[] | "#\(.number) [\(.rule.security_severity_level)] \(.rule.description) — \(.html_url)"'
            echo "::error::$count open high/critical CodeQL alert(s) on $REF — refusing to proceed until resolved or dismissed."
            exit 1
          fi
          echo "No open high/critical CodeQL alerts on $REF."
