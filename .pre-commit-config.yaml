# Mirrors the checks CI runs in .github/workflows/tests.yaml's `lint` and
# `meta-lint` jobs, so issues surface before a commit instead of after a push.
# mypy/pyright are deliberately not included here: both need the project's
# full dependency set (Home Assistant, pytest fixtures, etc.) on PYTHONPATH to
# type-check correctly, which pre-commit's isolated hook environments don't
# give them — they stay CI (and editor/Pylance)-only.
#
# Install with: pre-commit install
repos:
  # ruff and shellcheck-py are both pinned once, in requirements_dev.txt, not
  # duplicated here as a mirror-repo `rev` — language: system runs the
  # console script the project's own venv already has installed instead of
  # pre-commit pulling a second, separately-versioned copy, so there's one
  # source of truth per tool instead of two pins that can drift out of sync.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      # Docker variant: no local Go toolchain/binary to install, just the
      # Docker CLI this project's devcontainer already provides.
      - id: actionlint-docker

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
